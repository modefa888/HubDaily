<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-xl font-bold mb-4">API测试</h1>
        <div class="mb-4">
            <button onclick="testTvSharesApi()" class="bg-blue-500 text-white px-4 py-2 rounded-md">测试TV分享API</button>
        </div>
        <div class="mb-4">
            <button onclick="testAddTvShare()" class="bg-green-500 text-white px-4 py-2 rounded-md">测试添加TV分享</button>
        </div>
        <div id="result" class="mt-4 p-4 bg-gray-50 rounded-md whitespace-pre-wrap"></div>
    </div>

    <script>
        function testTvSharesApi() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '正在测试...';
            
            fetch('/api/tv/shares?page=1&limit=20')
                .then(response => response.json())
                .then(data => {
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    resultDiv.textContent = '测试失败: ' + error.message;
                });
        }

        function testAddTvShare() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '正在测试添加TV分享...';
            
            fetch('/api/tv/add-share', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer test-token'
                },
                body: JSON.stringify({
                    shareId: 's_test' + Date.now(),
                    url: 'test url',
                    title: 'Test Video',
                    pic: 'test pic',
                    source: 'test source',
                    expireSeconds: 3600,
                    expiresAt: Date.now() + 3600000
                })
            })
            .then(response => response.json())
            .then(data => {
                resultDiv.textContent = JSON.stringify(data, null, 2);
                // 测试添加后再次获取列表
                setTimeout(testTvSharesApi, 1000);
            })
            .catch(error => {
                resultDiv.textContent = '测试失败: ' + error.message;
            });
        }
    </script>
</body>
</html>
