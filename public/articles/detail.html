<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link href="https://unpkg.com/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        html {
            scrollbar-gutter: stable;
        }
        body {
            overflow-y: scroll;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        .markdown-content h1 {
            font-size: 2.25rem;
        }
        .markdown-content h2 {
            font-size: 1.875rem;
        }
        .markdown-content h3 {
            font-size: 1.5rem;
        }
        .markdown-content p {
            margin-bottom: 1.5rem;
            line-height: 1.75;
        }
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }
        .markdown-content li {
            margin-bottom: 0.75rem;
            line-height: 1.75;
        }
        .markdown-content code {
            background-color: #f3f4f6;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-family: 'Courier New', Courier, monospace;
        }
        .markdown-content pre {
            background-color: #f3f4f6;
            padding: 1.5rem;
            border-radius: 0.375rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 4px solid #e2e8f0;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
            color: #64748b;
            font-style: italic;
        }
        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 0.375rem;
            margin-bottom: 1.5rem;
        }
        .markdown-content a {
            color: #3b82f6;
            text-decoration: underline;
        }
        .markdown-content a:hover {
            color: #2563eb;
        }
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        .markdown-content th, .markdown-content td {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            text-align: left;
        }
        .markdown-content th {
            background-color: #f8fafc;
            font-weight: 600;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .animate-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
    <div class="min-h-screen flex flex-col">
        <nav class="bg-white border-b shadow-sm fixed top-0 left-0 right-0 z-40">
            <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <a href="/" class="text-lg font-semibold">DailyAPI</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-sm text-slate-600 hover:text-slate-900">首页</a>
                    <a href="/articles/index.html" class="text-sm text-blue-600 font-medium">文章</a>
                </div>
                <div class="flex items-center space-x-3 relative">
                    <!-- 登录状态显示头像 -->
                    <button
                        id="navUserAvatarButton"
                        onclick="toggleUserInfo()"
                        class="w-9 h-9 rounded-full bg-white shadow-md border border-gray-200 flex items-center justify-center overflow-hidden hover:shadow-lg transition hidden"
                        title="用户信息"
                    >
                        <img id="navUserAvatarImg" src="" alt="avatar" class="w-full h-full object-cover">
                    </button>
                    <!-- 未登录状态显示未登录链接 -->
                    <a
                        id="navUserLoginButton"
                        href="/login/index.html"
                        class="text-blue-600 font-semibold text-sm hover:text-blue-800"
                    >
                        未登录
                    </a>
                </div>
            </div>
        </nav>
        <main class="flex-1 pt-16 pb-8">
            <div class="max-w-4xl mx-auto px-4 space-y-6">
                <div class="pt-8 pb-4">
                    <div class="flex items-center justify-between mb-4">
                        <a href="/articles/index.html" class="inline-flex items-center text-sm text-slate-600 hover:text-slate-900">
                            <i class="fas fa-arrow-left mr-2"></i>
                            返回文章列表
                        </a>
                    </div>
                    <h1 id="articleTitle" class="text-3xl font-bold mb-4 hidden"></h1>
                    <div id="articleMeta" class="text-sm text-slate-500 mb-6 hidden"></div>
                </div>
                <div id="articleContent" class="bg-white rounded-xl shadow p-6 markdown-content hidden"></div>
                <div id="articleTags" class="flex flex-wrap gap-2 mb-8 hidden"></div>
                <div id="articleNavigation" class="flex justify-between items-center bg-white rounded-xl shadow p-4 mb-8 hidden"></div>
                <!-- 骨架屏 -->
                <div id="skeletonLoader" class="hidden">
                    <div class="pt-8 pb-4">
                        <div class="flex items-center justify-between mb-4">
                            <div class="h-4 bg-slate-200 rounded w-24 animate-pulse"></div>
                        </div>
                        <div class="h-10 bg-slate-200 rounded w-4/5 mb-4 animate-pulse"></div>
                        <div class="h-4 bg-slate-200 rounded w-1/2 mb-6 animate-pulse"></div>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6 animate-pulse">
                        <div class="space-y-4">
                            <div class="h-6 bg-slate-200 rounded w-full"></div>
                            <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                            <div class="h-4 bg-slate-200 rounded w-4/6"></div>
                            <div class="h-4 bg-slate-200 rounded w-full"></div>
                            <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                            <div class="h-4 bg-slate-200 rounded w-4/6"></div>
                            <!-- 图片占位符 -->
                            <div class="h-64 bg-slate-200 rounded-lg w-full"></div>
                            <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                            <div class="h-4 bg-slate-200 rounded w-full"></div>
                            <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                            <div class="h-4 bg-slate-200 rounded w-4/6"></div>
                            <div class="h-4 bg-slate-200 rounded w-full"></div>
                            <!-- 代码块占位符 -->
                            <div class="h-32 bg-slate-200 rounded-lg w-full"></div>
                            <div class="h-4 bg-slate-200 rounded w-full"></div>
                            <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-8 animate-pulse">
                        <div class="h-6 bg-slate-200 rounded w-20"></div>
                        <div class="h-6 bg-slate-200 rounded w-16"></div>
                        <div class="h-6 bg-slate-200 rounded w-24"></div>
                        <div class="h-6 bg-slate-200 rounded w-18"></div>
                    </div>
                    <div class="flex justify-between items-center bg-white rounded-xl shadow p-4 mb-8 animate-pulse">
                        <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                        <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                    </div>
                    <!-- 点赞和倒赞按钮骨架 -->
                    <div class="flex justify-center space-x-6 bg-white rounded-xl shadow p-6 mb-8 animate-pulse">
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-slate-200 rounded-full mb-2"></div>
                            <div class="h-4 bg-slate-200 rounded w-16"></div>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-slate-200 rounded-full mb-2"></div>
                            <div class="h-4 bg-slate-200 rounded w-16"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="bg-white border-t py-4">
            <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
                <p>© 2026 DailyAPI. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded hidden z-[70]"></div>

    <!-- 用户信息面板 -->
    <div 
        id="userPanel" 
        class="fixed top-0 right-0 bottom-0 w-4/5 md:w-96 bg-white shadow-xl transform translate-x-full transition-transform duration-300 z-40 overflow-hidden flex flex-col"
    >
        <div class="p-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-lg font-semibold">用户信息</h3>
            <button onclick="toggleUserInfo()" class="p-2 hover:bg-gray-200 rounded-full">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="userInfoContent" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-white rounded-lg p-4 shadow-sm space-y-3">
                <div class="flex items-center space-x-3">
                    <button id="panelUserAvatarButton" onclick="handleAvatarTripleClick()" class="w-14 h-14 rounded-full overflow-hidden bg-gray-100 border border-gray-200 focus:outline-none" title="连续点击3次随机头像">
                        <img id="panelUserAvatarPreview" src="" alt="avatar" class="w-full h-full object-cover hidden">
                    </button>
                    <div class="flex-1">
                        <div class="text-xs text-gray-500 mb-1">昵称</div>
                        <button id="panelUserNicknameButton" onclick="showNicknameEditor()" class="text-left text-sm font-semibold text-gray-800 hover:text-blue-600">
                            加载中...
                        </button>
                    </div>
                    <div class="text-xs text-gray-400">连点头像3次随机</div>
                </div>
                <div id="panelUserNicknameEditor" class="flex flex-col sm:flex-row sm:items-center space-y-2 sm:space-y-0 sm:space-x-2 hidden">
                    <input 
                        id="panelUserNicknameInput" 
                        type="text" 
                        placeholder="输入昵称" 
                        class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:flex-1 text-sm"
                        maxlength="20"
                    >
                    <button 
                        id="panelUserNicknameSave" 
                        onclick="saveUserNickname()" 
                        class="bg-blue-600 text-white rounded px-4 py-2 text-xs w-full sm:w-auto hover:bg-blue-700"
                    >
                        保存
                    </button>
                    <button 
                        id="panelUserNicknameRandom" 
                        onclick="setRandomNickname()" 
                        class="bg-indigo-600 text-white rounded px-4 py-2 text-xs w-full sm:w-auto hover:bg-indigo-700"
                    >
                        随机
                    </button>
                    <button 
                        type="button"
                        onclick="hideNicknameEditor()"
                        class="bg-indigo-600 text-white rounded px-4 py-2 text-xs w-full sm:w-auto hover:bg-indigo-700"
                    >
                        取消
                    </button>
                </div>
                <div class="space-y-2">
                    <div class="text-xs text-gray-500">备注</div>
                    <button id="panelUserNoteDisplay" onclick="showNoteEditor()" class="w-full text-left text-sm text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-md px-3 py-2 min-h-[36px]">
                        -
                    </button>
                    <textarea
                        id="panelUserNoteInput"
                        rows="2"
                        placeholder="填写备注..."
                        class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full text-sm hidden"
                        maxlength="200"
                    ></textarea>
                </div>
                <div>
                    <a href="/profile/index.html" class="bg-blue-600 text-white rounded px-4 py-2 text-center text-sm w-full inline-block hover:bg-blue-700">
                        <i class="fas fa-user mr-1"></i> 进入个人中心
                    </a>
                    <p class="text-xs text-gray-500 mt-2">查看账号信息、喜欢与分享列表</p>
                </div>
                <button id="logoutButton" onclick="logoutUser()" class="w-full bg-indigo-600 text-white rounded px-4 py-2 text-xs hover:bg-indigo-700 hidden" data-action="logout">
                    <i class="fas fa-sign-out mr-1"></i> <span>退出登录</span>
                </button>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm space-y-2 text-sm">
                <div class="flex items-center justify-between">
                    <span class="text-gray-500">点赞文章数量</span>
                    <span id="userLikeCount" class="font-medium text-gray-800">0</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-500">收藏文章数量</span>
                    <span id="userFavoriteCount" class="font-medium text-gray-800">0</span>
                </div>
            </div>
            
            <!-- 收藏列表 -->
            <div class="bg-white rounded-lg p-4 shadow-sm text-sm">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="font-medium text-gray-800">收藏文章</h4>
                    <button id="loadFavoritesButton" class="text-xs text-blue-600 hover:text-blue-800">
                        查看更多
                    </button>
                </div>
                <div id="userFavoritesList" class="space-y-2 max-h-48 overflow-y-auto">
                    <div class="text-center text-gray-400 text-xs py-4">
                        加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 背景遮罩 -->
    <div 
        id="overlay" 
        class="fixed inset-0 bg-black/50 z-30 hidden"
        onclick="closeAllPanels()"
    ></div>

    <script>
        const toast = (msg) => {
            const el = document.getElementById("toast");
            el.textContent = msg;
            el.classList.remove("hidden");
            setTimeout(() => el.classList.add("hidden"), 1800);
        };

        const formatTime = (value) => {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "-";
            return date.toLocaleString("zh-CN");
        };

        const getUrlParam = (name) => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        };

        const loadArticleDetail = async () => {
            const articleId = getUrlParam("id");
            if (!articleId) {
                toast("文章ID不存在");
                return;
            }

            // 隐藏实际内容（骨架屏已在DOMContentLoaded时显示）
            const titleElement = document.getElementById("articleTitle");
            const metaElement = document.getElementById("articleMeta");
            const contentElement = document.getElementById("articleContent");
            const tagsElement = document.getElementById("articleTags");
            const navElement = document.getElementById("articleNavigation");
            
            if (titleElement) titleElement.classList.add("hidden");
            if (metaElement) metaElement.classList.add("hidden");
            if (contentElement) contentElement.classList.add("hidden");
            if (tagsElement) tagsElement.classList.add("hidden");
            if (navElement) navElement.classList.add("hidden");

            try {
                // 获取 token
                const token = localStorage.getItem("userToken") || sessionStorage.getItem("userToken");
                
                // 构建请求头
                const headers = {};
                if (token) {
                    headers["Authorization"] = `Bearer ${token}`;
                }
                
                // 只请求文章详情，上一章和下一章信息由后端提供
                const articleRes = await fetch(`/api/article/${articleId}`, { headers });
                const articleData = await articleRes.json();
                
                if (articleData.code === 200 && articleData.data) {
                    renderArticleDetail(articleData.data);
                } else if (articleData.code === 403) {
                    // 显示权限错误信息
                    const contentElement = document.getElementById("articleContent");
                    const titleElement = document.getElementById("articleTitle");
                    const metaElement = document.getElementById("articleMeta");
                    const tagsElement = document.getElementById("articleTags");
                    const navElement = document.getElementById("articleNavigation");
                    
                    if (titleElement) titleElement.textContent = "权限不足";
                    if (metaElement) metaElement.innerHTML = `<span class="text-red-600">${articleData.message || "您没有权限查看此文章"}</span>`;
                    if (contentElement) {
                        contentElement.innerHTML = `
                            <div class="text-center py-12">
                                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-4">
                                    <i class="fas fa-lock text-2xl text-red-600"></i>
                                </div>
                                <h3 class="text-xl font-semibold mb-2">${articleData.message || "您没有权限查看此文章"}</h3>
                                <p class="text-slate-500 mb-6">请登录后再试</p>
                                <a href="/login/index.html?redirect=${encodeURIComponent(window.location.href)}" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                                    <i class="fas fa-sign-in-alt mr-2"></i> 登录
                                </a>
                            </div>
                        `;
                    }
                    if (tagsElement) tagsElement.classList.add("hidden");
                    if (navElement) navElement.classList.add("hidden");
                } else if (articleData.code === 404) {
                    toast("文章不存在");
                    const contentElement = document.getElementById("articleContent");
                    const navElement = document.getElementById("articleNavigation");
                    const tagsElement = document.getElementById("articleTags");
                    if (contentElement) {
                        contentElement.innerHTML = `
                            <div class="text-center py-12">
                                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 mb-4">
                                    <i class="fas fa-file-alt text-2xl text-slate-400"></i>
                                </div>
                                <h3 class="text-xl font-semibold mb-2">文章不存在</h3>
                                <p class="text-slate-500 mb-6">您访问的文章可能已被删除或不存在</p>
                                <a href="/articles/index.html" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                                    <i class="fas fa-arrow-left mr-2"></i> 返回文章列表
                                </a>
                            </div>
                        `;
                    }
                    if (navElement) navElement.classList.add("hidden");
                    if (tagsElement) tagsElement.classList.add("hidden");
                } else {
                    toast("加载文章失败");
                    const navElement = document.getElementById("articleNavigation");
                    const tagsElement = document.getElementById("articleTags");
                    if (navElement) navElement.classList.add("hidden");
                    if (tagsElement) tagsElement.classList.add("hidden");
                }
            } catch (error) {
                console.error("加载文章失败:", error);
                toast("加载文章失败");
                const contentElement = document.getElementById("articleContent");
                const navElement = document.getElementById("articleNavigation");
                const tagsElement = document.getElementById("articleTags");
                if (contentElement) {
                    contentElement.innerHTML = `
                        <div class="text-center py-12">
                            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 mb-4">
                                <i class="fas fa-exclamation-circle text-2xl text-amber-600"></i>
                            </div>
                            <h3 class="text-xl font-semibold mb-2">加载失败</h3>
                            <p class="text-slate-500 mb-6">加载文章时发生错误，请稍后再试</p>
                            <button onclick="loadArticleDetail()" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                                <i class="fas fa-refresh mr-2"></i> 重试
                            </button>
                        </div>
                    `;
                }
                if (navElement) navElement.classList.add("hidden");
                if (tagsElement) tagsElement.classList.add("hidden");
            } finally {
                // 隐藏骨架屏，显示实际内容
                if (skeletonLoader) {
                    skeletonLoader.classList.add("hidden");
                }
                if (titleElement) titleElement.classList.remove("hidden");
                if (metaElement) metaElement.classList.remove("hidden");
                if (contentElement) contentElement.classList.remove("hidden");
                if (tagsElement) tagsElement.classList.remove("hidden");
                if (navElement) navElement.classList.remove("hidden");
            }
        };

        const renderArticleDetail = (article) => {
            const titleElement = document.getElementById("articleTitle");
            const metaElement = document.getElementById("articleMeta");
            const contentElement = document.getElementById("articleContent");
            const tagsElement = document.getElementById("articleTags");
            const navElement = document.getElementById("articleNavigation");

            if (titleElement) {
                const isTop = article.isTop || false;
                titleElement.innerHTML = `${isTop ? '<span class="inline-flex items-center mr-2 px-2 py-0.5 bg-red-100 text-red-700 rounded text-xs"><i class="fas fa-thumbtack mr-1"></i>顶置</span>' : ''}${article.title || ""}`;
            }

            if (metaElement) {
                const publishTime = formatTime(article.publishTime);
                const status = article.status || "published";
                const isTop = article.isTop || false;
                metaElement.innerHTML = `
                    <span>发布时间: ${publishTime}</span>
                    ${isTop ? ' · <span class="text-red-600">已顶置</span>' : ''}
                    ${status === "draft" ? ' · <span class="text-amber-600">草稿</span>' : ''}
                    · <span class="text-slate-600"><i class="far fa-eye mr-1"></i>${article.viewCount || 0} 浏览</span>
                    · <span class="text-green-600"><i class="far fa-thumbs-up mr-1"></i>${article.likeCount || 0} 点赞</span>
                    · <span class="text-red-600"><i class="far fa-thumbs-down mr-1"></i>${article.dislikeCount || 0} 倒赞</span>
                `;
            }

            if (contentElement) {
                const content = article.content || "";
                contentElement.innerHTML = typeof marked === 'function' ? marked(content) : content;
            }

            if (tagsElement) {
                const tags = Array.isArray(article.tags) ? article.tags : [];
                if (tags.length > 0) {
                    tagsElement.innerHTML = tags.map(tag => `<span class="px-3 py-1 bg-slate-100 rounded text-sm text-slate-600">${tag}</span>`).join("");
                } else {
                    tagsElement.classList.add("hidden");
                }
            }

            if (navElement) {
                // 使用后端提供的上一章和下一章信息
                const prevArticle = article.prevArticle || null;
                const nextArticle = article.nextArticle || null;
                
                // 渲染导航
                navElement.innerHTML = `
                    <div class="flex-1">
                        ${prevArticle ? `
                            <a href="/articles/detail.html?id=${prevArticle._id}" class="flex items-center text-sm text-slate-600 hover:text-blue-600">
                                <i class="fas fa-arrow-left mr-2"></i>
                                <span>上一章：${prevArticle.title || ""}</span>
                            </a>
                        ` : '<div class="text-sm text-slate-400">没有上一章</div>'}
                    </div>
                    <div class="flex-1 text-right">
                        ${nextArticle ? `
                            <a href="/articles/detail.html?id=${nextArticle._id}" class="flex items-center justify-end text-sm text-slate-600 hover:text-blue-600">
                                <span>下一章：${nextArticle.title || ""}</span>
                                <i class="fas fa-arrow-right ml-2"></i>
                            </a>
                        ` : '<div class="text-sm text-slate-400">没有下一章</div>'}
                    </div>
                `;
            }
            
            // 添加点赞和倒赞按钮
            if (tagsElement) {
                const articleActionsDiv = document.createElement("div");
                articleActionsDiv.id = "articleActions";

                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });
                const data = await res.json();
                if (data.code === 200 && data.data) {
                    return { isLoggedIn: true, userInfo: data.data };
                }
                return { isLoggedIn: false, userInfo: null };
            } catch (error) {
                console.error("Token 验证失败:", error);

                }
            } catch (error) {
                console.error("加载点赞失败:", error);
            }
        };
        
        // 查看更多收藏
        document.addEventListener("DOMContentLoaded", () => {
            const loadFavoritesButton = document.getElementById("loadFavoritesButton");
            if (loadFavoritesButton) {
                loadFavoritesButton.addEventListener("click", () => {
                    window.location.href = "/user/profile/index.html";
                });
            }
        });

        // 页面加载时加载文章详情和用户信息
        window.addEventListener("DOMContentLoaded", async () => {
            // 立即显示骨架屏
            const skeletonLoader = document.getElementById("skeletonLoader");
            if (skeletonLoader) {
                skeletonLoader.classList.remove("hidden");
            }
            
            // 设置登录链接的 redirect 参数
            const navUserLoginButton = document.getElementById("navUserLoginButton");
            if (navUserLoginButton) {
                navUserLoginButton.href = `/login/index.html?redirect=${encodeURIComponent(window.location.href)}`;
            }
            
            loadArticleDetail();
            await loadUserInfo();
        });
    </script>
</body>
</html>
