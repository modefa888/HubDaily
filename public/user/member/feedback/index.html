<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户建议</title>
  <link href="https://unpkg.com/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
  <style>
    html {
      scrollbar-gutter: stable;
    }
    body {
      overflow-y: scroll;
    }
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 1000;
      animation: fadeIn 0.3s ease-out;
    }
    .toast-success {
      background-color: #10b981;
    }
    .toast-error {
      background-color: #ef4444;
    }
    .toast-info {
      background-color: #3b82f6;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-3xl mx-auto px-4 py-6 space-y-4">
    <div class="bg-white rounded-xl shadow p-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-semibold">用户建议</h1>
        <div class="text-xs text-slate-500 mt-1">
          <span id="loginStatus">校验登录中...</span>
          <button id="loginBtn" class="ml-2 text-blue-600 hidden">去登录</button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow p-4 space-y-2">
      <div class="flex items-center justify-between text-xs text-slate-500">
        <span id="serverMeta">历史反馈：未加载</span>
        <button id="refreshServerBtn" class="text-blue-600 hidden">刷新历史</button>
      </div>
      <div id="chatList" class="space-y-3 max-h-[60vh] overflow-y-auto pr-1"></div>
    </div>

    <div class="bg-white rounded-xl shadow p-4 space-y-3">
      <div class="space-y-2">
        <div class="flex flex-col sm:flex-row gap-2">
          <input id="nicknameInput" class="border rounded px-3 py-2 text-sm flex-1 bg-slate-100" placeholder="你的称呼" readonly>
          <select id="typeSelect" class="border rounded px-3 py-2 text-sm w-40">
            <option value="建议">建议</option>
            <option value="问题">问题</option>
            <option value="反馈">反馈</option>
          </select>
        </div>
        <input id="emailInput" class="border rounded px-3 py-2 text-sm w-full" placeholder="你的邮箱（可选）">
      </div>
      <textarea id="messageInput" rows="3" class="border rounded px-3 py-2 text-sm w-full" placeholder="请输入你的建议..."></textarea>
      <div class="flex items-center gap-2">
        <input id="captchaInput" class="border rounded px-3 py-2 text-sm flex-1" placeholder="请输入验证码">
        <img id="captchaImage" class="w-32 h-10 cursor-pointer border rounded" src="" alt="验证码">
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-slate-500">提交后会保存到后端</span>
        <button id="sendBtn" class="px-4 py-2 rounded bg-emerald-600 text-white text-sm">发送</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "userToken";

    const chatList = document.getElementById("chatList");
    const messageInput = document.getElementById("messageInput");
    const nicknameInput = document.getElementById("nicknameInput");
    const emailInput = document.getElementById("emailInput");
    const typeSelect = document.getElementById("typeSelect");
    const sendBtn = document.getElementById("sendBtn");

    const loginStatus = document.getElementById("loginStatus");
    const loginBtn = document.getElementById("loginBtn");
    const serverMeta = document.getElementById("serverMeta");
    const refreshServerBtn = document.getElementById("refreshServerBtn");
    const captchaInput = document.getElementById("captchaInput");
    const captchaImage = document.getElementById("captchaImage");
    let currentRole = "";

    const getToken = () => localStorage.getItem(TOKEN_KEY) || "";
    const authHeaders = () => {
      const token = getToken();
      return token ? { Authorization: "Bearer " + token } : {};
    };
    const redirectToLogin = () => {
      const redirect = encodeURIComponent("/user/feedback.html");
      window.location.href = `/login/index.html?redirect=${redirect}`;
    };

    const refreshLoginStatus = async () => {
      const token = getToken();
      if (!token) {
        loginStatus.textContent = "未登录，登录后可提交";
        loginBtn.classList.remove("hidden");
        refreshServerBtn.classList.add("hidden");
        sendBtn.disabled = true;
        sendBtn.classList.add("opacity-60", "cursor-not-allowed");
        return;
      }
      try {
        const res = await fetch("/api/user/profile", { headers: authHeaders() });
        const data = await res.json();
        if (data.code === 200) {
          loginStatus.textContent = "已登录";
          loginBtn.classList.add("hidden");
          refreshServerBtn.classList.remove("hidden");
          sendBtn.disabled = false;
          sendBtn.classList.remove("opacity-60", "cursor-not-allowed");
          currentRole = String(data.data?.role || "");
          // Set user's nickname from profile
          const nickname = data.data?.nickname || data.data?.username || "用户";
          nicknameInput.value = nickname;
          await loadSelfFeedback();
          return;
        }
      } catch (e) {
        // ignore
      }
      loginStatus.textContent = "登录失效，请重新登录";
      loginBtn.classList.remove("hidden");
      refreshServerBtn.classList.add("hidden");
      sendBtn.disabled = true;
      sendBtn.classList.add("opacity-60", "cursor-not-allowed");
    };



    const showSkeleton = () => {
      chatList.innerHTML = `
        <div class="space-y-4">
          ${Array(3).fill('').map(() => `
            <div class="border rounded-lg p-3 bg-slate-50 animate-pulse">
              <div class="h-4 bg-slate-200 rounded w-1/3 mb-2"></div>
              <div class="h-3 bg-slate-200 rounded w-full mb-2"></div>
              <div class="h-3 bg-slate-200 rounded w-2/3"></div>
            </div>
          `).join('')}
        </div>
      `;
    };

    const renderServerMessages = (list) => {
      if (!Array.isArray(list) || list.length === 0) {
        serverMeta.textContent = "历史反馈：暂无";
        chatList.innerHTML = '<div class="text-sm text-slate-500 text-center py-6">暂无反馈记录</div>';
        return;
      }
      serverMeta.textContent = `历史反馈：共 ${list.length} 条`;
      chatList.innerHTML = list.map((item) => {
        const nickname = item.userNickname || item.nickname || "用户";
        const title = item.type ? `${nickname} · ${item.type}` : nickname;
        const emailText = item.email ? ` · ${item.email}` : '';
        const replies = Array.isArray(item.replies) ? item.replies : [];
        const hasAdminReply = replies.some((reply) => reply && reply.role === "admin");
        const canReply = currentRole === "admin" || hasAdminReply;
        const repliesHtml = replies.length
          ? `<div class="mt-2 space-y-2">
              <div class="text-xs text-slate-500">回复</div>
              ${replies.map((reply) => {
              const roleLabel = reply.role === "admin" ? "管理员" : "你";
              return `
                <div class="rounded border px-2 py-1 text-xs ${reply.role === "admin" ? "bg-emerald-50 border-emerald-200" : "bg-white border-slate-200"} text-slate-600">
                  <span class="text-slate-500">${roleLabel} · ${new Date(reply.createdAt).toLocaleString()}</span>
                  <div class="text-slate-700 whitespace-pre-wrap mt-1">${reply.message || ""}</div>
                </div>
              `;
            }).join("")}
            </div>`
          : "";
        const typeClass = {
          '建议': 'border-emerald-300',
          '问题': 'border-red-300',
          '反馈': 'border-blue-300'
        }[item.type] || 'border-slate-300';
        return `
          <div class="border ${typeClass} rounded-lg p-3 bg-slate-50" data-feedback-id="${item.id || ""}">
            <div class="text-xs text-slate-500 mb-1">${title}${emailText} · ${new Date(item.createdAt).toLocaleString()}</div>
            <div class="text-sm text-slate-800 whitespace-pre-wrap">${item.message || ""}</div>
            ${repliesHtml}
            ${canReply ? `<div class="mt-3 flex items-center gap-2"><input class="reply-input flex-1 border rounded px-2 py-1 text-xs" placeholder="回复这条反馈"><button class="reply-btn px-2 py-1 rounded bg-slate-800 text-white text-xs">回复</button></div>` : ""}
          </div>
        `;
      }).join("");
      chatList.scrollTop = 0;
    };

    const loadSelfFeedback = async () => {
      const token = getToken();
      if (!token) {
        serverMeta.textContent = "历史反馈：未登录";
        chatList.innerHTML = '<div class="text-sm text-slate-500 text-center py-6">请登录后查看历史反馈</div>';
        return;
      }
      try {
        serverMeta.textContent = "历史反馈：加载中...";
        showSkeleton();
        const res = await fetch("/api/user/feedbacks/self?page=1&pageSize=50", { headers: authHeaders() });
        const data = await res.json();
        if (data.code !== 200) {
          serverMeta.textContent = data.message || "历史反馈：加载失败";
          chatList.innerHTML = '<div class="text-sm text-slate-500 text-center py-6">加载失败，请稍后重试</div>';
          return;
        }
        const list = Array.isArray(data.data) ? data.data : [];
        renderServerMessages(list);
      } catch (e) {
        serverMeta.textContent = "历史反馈：加载失败";
        chatList.innerHTML = '<div class="text-sm text-slate-500 text-center py-6">加载失败，请稍后重试</div>';
      }
    };

    const showToast = (message, type = 'info') => {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'fadeIn 0.3s ease-out reverse';
        setTimeout(() => {
          document.body.removeChild(toast);
        }, 300);
      }, 2000);
    };

    const loadCaptcha = () => {
      captchaImage.src = `/api/user/captcha?${Date.now()}`;
    };

    const setBtnLoading = (btn, loading, label) => {
      if (!btn) return;
      if (loading) {
        btn.disabled = true;
        btn.classList.add("opacity-70", "cursor-not-allowed");
        btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>' + (label || "处理中...") + '</span></span>';
      } else {
        btn.disabled = false;
        btn.classList.remove("opacity-70", "cursor-not-allowed");
        btn.textContent = label || "完成";
      }
    };

    sendBtn.addEventListener("click", async () => {
      const message = (messageInput.value || "").trim();
      if (!message) {
        showToast("请输入反馈内容", "error");
        return;
      }
      const captcha = (captchaInput.value || "").trim();
      if (!captcha) {
        showToast("请输入验证码", "error");
        return;
      }
      const token = getToken();
      if (!token) {
        redirectToLogin();
        return;
      }
      setBtnLoading(sendBtn, true, "发送中...");
      try {
        // 验证验证码
        const verifyRes = await fetch("/api/user/verify-captcha", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ captcha })
        });
        const verifyData = await verifyRes.json();
        if (verifyData.code !== 200) {
          showToast(verifyData.message || "验证码错误", "error");
          loadCaptcha();
          return;
        }
        const payload = {
          type: typeSelect.value || "建议",
          message,
          email: (emailInput.value || "").trim(),
          page: window.location.pathname
        };
        const res = await fetch("/api/user/feedbacks", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.code !== 200) {
          showToast(data.message || "提交失败", "error");
          return;
        }
        messageInput.value = "";
        captchaInput.value = "";
        loadCaptcha();
        showToast("已发送", "success");
        await loadSelfFeedback();
      } catch (e) {
        showToast("提交失败", "error");
      } finally {
        setBtnLoading(sendBtn, false, "发送");
      }
    });



    loginBtn.addEventListener("click", () => {
      redirectToLogin();
    });
    refreshServerBtn.addEventListener("click", async () => {
      setBtnLoading(refreshServerBtn, true, "加载中...");
      try {
        await loadSelfFeedback();
      } finally {
        setBtnLoading(refreshServerBtn, false, "刷新历史");
      }
    });

    chatList.addEventListener("click", async (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      if (!target.classList.contains("reply-btn")) return;
      const card = target.closest("[data-feedback-id]");
      if (!card) return;
      const id = card.getAttribute("data-feedback-id");
      const input = card.querySelector(".reply-input");
      const message = input ? String(input.value || "").trim() : "";
      if (!id || !message) return;
      const token = getToken();
      if (!token) {
        redirectToLogin();
        return;
      }
      setBtnLoading(target, true, "发送中...");
      try {
        const res = await fetch(`/api/user/feedbacks/${id}/reply`, {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        if (data.code !== 200) {
          showToast(data.message || "回复失败", "error");
          return;
        }
        if (input) input.value = "";
        showToast("已回复", "success");
        await loadSelfFeedback();
      } catch (e2) {
        showToast("回复失败", "error");
      } finally {
        setBtnLoading(target, false, "回复");
      }
    });

    // 验证码图片点击事件
    captchaImage.addEventListener("click", loadCaptcha);

    // Show skeleton screen immediately on page load
    showSkeleton();
    refreshLoginStatus();
    loadCaptcha();
  </script>
</body>
</html>
