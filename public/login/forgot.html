<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>忘记密码</title>
    <link href="../node_modules/tailwindcss/index.css" rel="stylesheet">
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-5">
      <header class="space-y-1">
        <h1 class="text-2xl font-bold">忘记密码</h1>
        <p class="text-sm text-slate-500">请输入您的邮箱并回答安全问题</p>
      </header>

      <section class="space-y-3">
        <input id="email" class="w-full border rounded px-3 py-2" placeholder="邮箱" />
        <div id="securityQuestionSection" class="hidden">
          <div class="text-sm font-medium mb-2">安全问题：</div>
          <div id="securityQuestion" class="text-sm text-slate-700 mb-2"></div>
          <input id="securityAnswer" class="w-full border rounded px-3 py-2" placeholder="安全问题答案" />
        </div>
        <input id="newPassword" type="password" class="w-full border rounded px-3 py-2 hidden" placeholder="新密码" />
        <input id="newPasswordConfirm" type="password" class="w-full border rounded px-3 py-2 hidden" placeholder="确认新密码" />
        <button id="submitBtn" class="w-full bg-blue-600 text-white rounded py-2">下一步</button>
      </section>

      <div class="text-xs text-slate-500 text-center">
        <a href="/login/index.html" class="text-blue-600 hover:underline">返回登录</a>
      </div>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded hidden z-[70]"></div>

    <script>
      const toast = (msg) => {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.remove("hidden");
        setTimeout(() => el.classList.add("hidden"), 1800);
      };

      let currentStep = 1; // 1: 输入邮箱, 2: 回答安全问题, 3: 设置新密码
      let userId = null;

      document.getElementById("submitBtn").addEventListener("click", async () => {
        if (currentStep === 1) {
          // 第一步：验证邮箱
          const email = document.getElementById("email").value.trim();
          if (!email) {
            toast("请输入邮箱");
            return;
          }
          if (!/^[A-Za-z0-9]+@[A-Za-z0-9]+(\.[A-Za-z0-9]+)+$/.test(email)) {
            toast("请输入有效的邮箱地址");
            return;
          }

          const btn = document.getElementById("submitBtn");
          const originalText = btn.textContent;
          btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>验证中...</span></span>';
          btn.disabled = true;

          try {
            const res = await fetch("/api/user/forgot-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.code === 200 && data.data) {
              userId = data.data.userId;
              document.getElementById("securityQuestion").textContent = data.data.securityQuestion;
              document.getElementById("securityQuestionSection").classList.remove("hidden");
              currentStep = 2;
              btn.textContent = "验证答案";
            } else {
              toast(data.message || "验证失败");
              btn.textContent = originalText;
            }
          } catch (error) {
            toast("验证失败，请稍后重试");
            btn.textContent = originalText;
          } finally {
            btn.disabled = false;
          }
        } else if (currentStep === 2) {
          // 第二步：验证安全问题答案
          const securityAnswer = document.getElementById("securityAnswer").value.trim();
          if (!securityAnswer) {
            toast("请输入安全问题答案");
            return;
          }

          const btn = document.getElementById("submitBtn");
          const originalText = btn.textContent;
          btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>验证中...</span></span>';
          btn.disabled = true;

          try {
            const res = await fetch("/api/user/verify-security-answer", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ userId, securityAnswer })
            });
            const data = await res.json();
            if (data.code === 200 && data.data) {
              document.getElementById("newPassword").classList.remove("hidden");
              document.getElementById("newPasswordConfirm").classList.remove("hidden");
              currentStep = 3;
              btn.textContent = "重置密码";
            } else {
              toast(data.message || "答案错误");
              btn.textContent = originalText;
            }
          } catch (error) {
            toast("验证失败，请稍后重试");
            btn.textContent = originalText;
          } finally {
            btn.disabled = false;
          }
        } else if (currentStep === 3) {
          // 第三步：设置新密码
          const newPassword = document.getElementById("newPassword").value.trim();
          const newPasswordConfirm = document.getElementById("newPasswordConfirm").value.trim();

          if (!newPassword) {
            toast("请输入新密码");
            return;
          }

          if (newPassword !== newPasswordConfirm) {
            toast("两次密码不一致");
            return;
          }

          const btn = document.getElementById("submitBtn");
          const originalText = btn.textContent;
          btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>重置中...</span></span>';
          btn.disabled = true;

          try {
            const res = await fetch("/api/user/reset-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ userId, password: newPassword })
            });
            const data = await res.json();
            if (data.code === 200) {
              toast("密码重置成功");
              setTimeout(() => window.location.href = "/login/index.html", 2000);
            } else {
              toast(data.message || "重置失败");
            }
          } catch (error) {
            toast("重置失败，请稍后重试");
          } finally {
            btn.disabled = false;
            btn.textContent = originalText;
          }
        }
      });
    </script>
  </body>
</html>
