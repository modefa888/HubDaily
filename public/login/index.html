<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 / 注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-5">
      <header class="space-y-1">
        <h1 class="text-2xl font-bold">账号登录</h1>
        <p class="text-sm text-slate-500">登录或注册后即可访问已授权页面</p>
      </header>

      <div class="grid grid-cols-2 gap-2 text-sm">
        <button id="tabLogin" class="px-3 py-2 rounded-lg bg-slate-800 text-white">登录</button>
        <button id="tabRegister" class="px-3 py-2 rounded-lg bg-slate-100 text-slate-600">注册</button>
      </div>

      <section id="loginPanel" class="space-y-3">
        <input id="loginUsername" class="w-full border rounded px-3 py-2" placeholder="邮箱(仅字母数字)" />
        <input id="loginPassword" type="password" class="w-full border rounded px-3 py-2" placeholder="密码" />
        <button id="loginBtn" class="w-full bg-blue-600 text-white rounded py-2">登录</button>
      </section>

      <section id="registerPanel" class="space-y-3 hidden">
        <input id="regUsername" class="w-full border rounded px-3 py-2" placeholder="邮箱(仅字母数字)" />
        <input id="regNickname" class="w-full border rounded px-3 py-2" placeholder="昵称(可选)" />
        <input id="regPassword" type="password" class="w-full border rounded px-3 py-2" placeholder="密码" />
        <input id="regPasswordConfirm" type="password" class="w-full border rounded px-3 py-2" placeholder="确认密码" />
        <select id="regSecurityQuestion" class="w-full border rounded px-3 py-2">
          <option value="">加载安全问题中...</option>
        </select>
        <input id="regSecurityAnswer" class="w-full border rounded px-3 py-2" placeholder="安全问题答案" />
        <div class="grid grid-cols-2 gap-2">
          <input id="regCaptcha" class="w-full border rounded px-3 py-2" placeholder="请输入验证码" />
          <div class="flex items-center">
            <img id="captchaImage" src="" alt="验证码" class="h-10 w-full object-contain cursor-pointer border rounded" />
          </div>
        </div>
        <button id="regBtn" class="w-full bg-emerald-600 text-white rounded py-2">注册</button>
      </section>

      <div class="text-xs text-slate-500 text-center">
        已有账号，<a href="/login/forgot.html" class="text-blue-600 hover:underline">忘记密码</a>
      </div>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded hidden z-[70]"></div>

    <script>
      const TOKEN_KEY = "userToken";
      const MSG = {
        accountEmpty: "请输入邮箱",
        accountInvalid: "账号需为仅字母数字的邮箱",
        passwordEmpty: "请输入密码",
        passwordConfirmEmpty: "请确认密码",
        passwordMismatch: "两次密码不一致",
        loginFailed: "登录失败",
        registerFailed: "注册失败",
      };
      const normalizeServerMessage = (message, fallback) => {
        if (!message) return fallback;
        if (message.includes("账号需为仅字母数字的邮箱")) return MSG.accountInvalid;
        if (message.includes("用户名或密码不能为空")) return MSG.passwordEmpty;
        if (message.includes("用户名不能为空")) return MSG.accountEmpty;
        if (message.includes("密码不能为空")) return MSG.passwordEmpty;
        return message;
      };
      const toast = (msg) => {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.remove("hidden");
        setTimeout(() => el.classList.add("hidden"), 1800);
      };
      const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
      const isValidAccount = (value) => /^[A-Za-z0-9]+@[A-Za-z0-9]+(\.[A-Za-z0-9]+)+$/.test(value);
      const ensureAccount = (value) => {
        if (!value) {
          toast(MSG.accountEmpty);
          return false;
        }
        if (!isValidAccount(value)) {
          toast(MSG.accountInvalid);
          return false;
        }
        return true;
      };
      const params = new URLSearchParams(window.location.search);
      const redirectTarget = params.get("redirect") || "/index.html";

      // 加载安全问题列表
      async function loadSecurityQuestions() {
        try {
          const res = await fetch("/api/user/security-questions");
          const data = await res.json();
          if (data.code === 200 && data.data && data.data.securityQuestions) {
            const select = document.getElementById("regSecurityQuestion");
            select.innerHTML = '<option value="">选择安全问题</option>';
            data.data.securityQuestions.forEach(question => {
              const option = document.createElement("option");
              option.value = question;
              option.textContent = question;
              select.appendChild(option);
            });
          }
        } catch (error) {
          console.error("加载安全问题失败:", error);
          // 加载失败时使用默认安全问题
          const select = document.getElementById("regSecurityQuestion");
          select.innerHTML = `
            <option value="">选择安全问题</option>
            <option value="您母亲的姓名是什么？">您母亲的姓名是什么？</option>
            <option value="您的出生城市是？">您的出生城市是？</option>
            <option value="您的小学校名是？">您的小学校名是？</option>
            <option value="您的第一个宠物名字是？">您的第一个宠物名字是？</option>
            <option value="您的第一次旅行地点是？">您的第一次旅行地点是？</option>
          `;
        }
      }

      // 页面加载时加载安全问题
      loadSecurityQuestions();

      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const loginPanel = document.getElementById("loginPanel");
      const registerPanel = document.getElementById("registerPanel");

      const switchTab = (mode) => {
        if (mode === "login") {
          tabLogin.className = "px-3 py-2 rounded-lg bg-slate-800 text-white";
          tabRegister.className = "px-3 py-2 rounded-lg bg-slate-100 text-slate-600";
          loginPanel.classList.remove("hidden");
          registerPanel.classList.add("hidden");
        } else {
          tabRegister.className = "px-3 py-2 rounded-lg bg-slate-800 text-white";
          tabLogin.className = "px-3 py-2 rounded-lg bg-slate-100 text-slate-600";
          registerPanel.classList.remove("hidden");
          loginPanel.classList.add("hidden");
        }
      };

      tabLogin.addEventListener("click", () => switchTab("login"));
      tabRegister.addEventListener("click", () => switchTab("register"));

      document.getElementById("loginBtn").addEventListener("click", async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        if (!ensureAccount(username) || !password) {
          if (!password) toast(MSG.passwordEmpty);
          return;
        }
        const btn = document.getElementById("loginBtn");
        const originalText = btn.textContent;
        btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>登录中...</span></span>';
        btn.disabled = true;
        try {
          const res = await fetch("/api/user/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (data.code === 200 && data.data && data.data.token) {
            setToken(data.data.token);
            toast("登录成功");
            setTimeout(() => (window.location.href = redirectTarget), 600);
          } else {
            toast(normalizeServerMessage(data.message, MSG.loginFailed));
          }
        } finally {
          btn.disabled = false;
          btn.textContent = originalText;
        }
      });

      // 验证码图片点击刷新
      document.getElementById("captchaImage").addEventListener("click", () => {
        // 使用fetch请求获取验证码，确保携带凭证
        fetch("/api/user/captcha?" + new Date().getTime(), {
          credentials: 'include' // 携带凭证
        }).then(response => response.text()).then(svg => {
          const captchaImage = document.getElementById("captchaImage");
          captchaImage.src = "data:image/svg+xml;base64," + btoa(svg);
        });
      });

      // 页面加载时获取验证码，确保携带凭证
      window.addEventListener("load", () => {
        fetch("/api/user/captcha?" + new Date().getTime(), {
          credentials: 'include' // 携带凭证
        }).then(response => response.text()).then(svg => {
          const captchaImage = document.getElementById("captchaImage");
          captchaImage.src = "data:image/svg+xml;base64," + btoa(svg);
        });
      });

      // 登录表单回车自动下一个
      const loginInputs = ["loginUsername", "loginPassword"];
      loginInputs.forEach((id, index) => {
        const input = document.getElementById(id);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            if (index < loginInputs.length - 1) {
              document.getElementById(loginInputs[index + 1]).focus();
            } else {
              document.getElementById("loginBtn").click();
            }
          }
        });
      });

      // 注册表单回车自动下一个
      const regInputs = ["regUsername", "regNickname", "regPassword", "regPasswordConfirm", "regSecurityQuestion", "regSecurityAnswer", "regCaptcha"];
      regInputs.forEach((id, index) => {
        const input = document.getElementById(id);
        if (input) {
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              if (index < regInputs.length - 1) {
                const nextInput = document.getElementById(regInputs[index + 1]);
                if (nextInput) nextInput.focus();
              } else {
                document.getElementById("regBtn").click();
              }
            }
          });
        }
      });

      document.getElementById("regBtn").addEventListener("click", async () => {
        const username = document.getElementById("regUsername").value.trim();
        const nickname = document.getElementById("regNickname").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const passwordConfirm = document.getElementById("regPasswordConfirm").value.trim();
        const securityQuestion = document.getElementById("regSecurityQuestion").value;
        const securityAnswer = document.getElementById("regSecurityAnswer").value.trim();
        const captcha = document.getElementById("regCaptcha").value.trim();
        if (!ensureAccount(username) || !password) {
          if (!password) toast(MSG.passwordEmpty);
          return;
        }
        if (!passwordConfirm) {
          toast(MSG.passwordConfirmEmpty);
          return;
        }
        if (password !== passwordConfirm) {
          toast(MSG.passwordMismatch);
          return;
        }
        if (!securityQuestion) {
          toast("请选择安全问题");
          return;
        }
        if (!securityAnswer) {
          toast("请输入安全问题答案");
          return;
        }
        if (!captcha) {
          toast("请输入验证码");
          return;
        }
        const btn = document.getElementById("regBtn");
        const originalText = btn.textContent;
        btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>验证中...</span></span>';
        btn.disabled = true;
        try {
          // 先验证验证码
          const captchaRes = await fetch("/api/user/verify-captcha", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: 'include', // 携带凭证
            body: JSON.stringify({ captcha })
          });
          const captchaData = await captchaRes.json();
          if (captchaData.code !== 200) {
            toast(captchaData.message || "验证码验证失败");
            // 刷新验证码
            document.getElementById("captchaImage").src = "/api/user/captcha?" + new Date().getTime();
            return;
          }
          
          // 验证码验证通过，进行注册
          btn.innerHTML = '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span><span>注册中...</span></span>';
          const res = await fetch("/api/user/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, nickname, securityQuestion, securityAnswer })
          });
          const data = await res.json();
          if (data.code === 200) {
            toast("注册成功，正在登录");
            const loginRes = await fetch("/api/user/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password })
            });
            const loginData = await loginRes.json();
            if (loginData.code === 200 && loginData.data && loginData.data.token) {
              setToken(loginData.data.token);
              setTimeout(() => (window.location.href = redirectTarget), 600);
            } else {
              toast(loginData.message || "自动登录失败，请手动登录");
              switchTab("login");
            }
          } else {
            toast(normalizeServerMessage(data.message, MSG.registerFailed));
            // 刷新验证码
            document.getElementById("captchaImage").src = "/api/user/captcha?" + new Date().getTime();
          }
        } finally {
          btn.disabled = false;
          btn.textContent = originalText;
        }
      });
    </script>
      <script src="/assets/login-guard.js"></script>
  <script src="/assets/page-permission.js"></script>
  </body>
</html>
