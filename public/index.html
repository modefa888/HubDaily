<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>DailyHot API</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --text-color: #000;
        --text-color-gray: #888;
        --text-color-hover: #fff;
        --icon-color: #444;
      }
      html.dark-mode {
        --text-color: #fff;
        --text-color-gray: #888;
        --text-color-hover: #3c3c3c;
        --icon-color: #cbcbcb;
      }
      * {
        margin: 0;
        padding: 0;
        -webkit-user-select: none;
        user-select: none;
      }
      html {
        height: 100%;
      }
      body {
        background-color: var(--text-color-hover);
        color: var(--text-color);
        font-family: "PingFang SC", "Open Sans", "Microsoft YaHei", sans-serif;
        transition:
          background-color 0.5s,
          color 0.5s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        height: 100%;
      }
      .dark-mode body {
        background-color: #2a2a2a;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      a {
        text-decoration: none;
        color: var(--text-color-gray);
        transition: all 0.5s ease;
      }
      a:hover {
        color: var(--text-color);
      }
      .ico {
        margin: 4rem 2rem;
        font-size: 6rem;
        color: var(--text-color-gray);
        transition: all 0.3s ease;
      }
      .title {
        font-size: 2rem;
        font-weight: bold;
        transition: all 0.3s ease;
      }
      .text {
        margin: 1rem;
        font-size: 1.1rem;
        color: var(--text-color-gray);
        transition: all 0.3s ease;
      }
      .control button {
        background-color: var(--text-color-hover);
        border: var(--text-color) solid 2px;
        border-radius: 50px;
        padding: 0.8rem 2rem;
        transition: all 0.5s ease;
        margin: 1.5rem 0.5rem;
        color: var(--text-color);
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: 500;
        min-width: 180px;
      }
      .control button:hover {
        border: var(--text-color) solid 2px;
        background: var(--text-color);
        color: var(--text-color-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
      }
      .control button i {
        margin-right: 8px;
        font-size: 1.2rem;
      }
      .apps {
        width: 100%;
        max-width: 900px;
        padding: 0 16px 32px;
        transition: all 0.3s ease;
      }
      .apps-title {
        font-size: 18px;
        font-weight: 600;
        margin: 2rem 0 16px;
        color: var(--text-color);
        padding-bottom: 8px;
        border-bottom: 2px solid rgba(148, 163, 184, 0.2);
        transition: all 0.3s ease;
      }
      .app-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        transition: all 0.3s ease;
      }
      .app-card {
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.8);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        min-height: 100px;
        justify-content: center;
      }
      .app-card i {
        font-size: 24px;
        color: var(--icon-color);
        transition: all 0.3s ease;
      }
      .app-card span {
        font-size: 16px;
        color: var(--text-color);
        text-align: center;
        transition: all 0.3s ease;
      }
      .app-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.15);
        border-color: var(--text-color);
      }
      footer {
        line-height: 1.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 140px;
      }
      footer .social {
        color: var(--icon-color);
        font-size: 15px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      footer .social i {
        margin: 0 12px;
      }
      footer .point::before {
        content: "·";
        color: var(--text-color-gray);
      }
      .power,
      .icp {
        font-size: 14px;
      }
      @media (max-width: 900px) {
        main {
          justify-content: flex-start;
          padding-top: 40px;
        }
        .ico {
          margin: 2rem 1rem;
          font-size: 5rem;
        }
        .title {
          font-size: 1.8rem;
          text-align: center;
          padding: 0 20px;
        }
        .text {
          margin: 1rem 0 1.5rem;
          font-size: 1.1rem;
          text-align: center;
          padding: 0 20px;
        }
        .control {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
        }
        .control button {
          margin: 1rem 0.5rem;
          padding: 1rem 2.5rem;
          font-size: 1.2rem;
          min-width: 200px;
        }
        .apps {
          padding: 0 20px 32px;
        }
        .apps-title {
          font-size: 1.2rem;
          margin: 2.5rem 0 20px;
        }
        .app-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 20px;
        }
        .app-card {
          padding: 20px;
          min-height: 120px;
        }
        .app-card i {
          font-size: 28px;
        }
        .app-card span {
          font-size: 18px;
        }
        footer {
          height: auto;
          padding: 20px 0 30px;
        }
        footer .social {
          font-size: 18px;
        }
        footer .social i {
          margin: 0 16px;
        }
        .power,
      .icp {
        font-size: 14px;
        text-align: center;
        padding: 0 20px;
      }
    }
    
    @media (max-width: 480px) {
        .ico {
          font-size: 4.5rem;
          margin: 1.5rem 1rem;
        }
        .title {
          font-size: 1.6rem;
        }
        .control button {
          min-width: 180px;
          padding: 0.9rem 2rem;
        }
        .app-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 16px;
        }
        .app-card {
          padding: 16px;
          min-height: 100px;
        }
        .app-card i {
          font-size: 24px;
        }
        .app-card span {
          font-size: 16px;
        }
    }
    
    /* 加载条样式 */
    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: rgba(0, 0, 0, 0.1);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .loading-bar.active {
      opacity: 1;
    }
    
    .loading-progress {
      height: 100%;
      background-color: #3b82f6;
      width: 0%;
      transition: width 0.1s ease;
    }
  </style>
  </head>
  <body>
    <!-- 加载条 -->
    <div id="loadingBar" class="loading-bar">
      <div id="loadingProgress" class="loading-progress"></div>
    </div>
    <main>
      <div class="ico"><i class="fa-solid fa-code"></i></div>
      <div class="title">DailyHot API</div>
      <div class="text">服务已正常运行</div>
      <div class="control">
        <button onclick="clickFunction()">
          <i class="fa-solid fa-vial"></i>
          <span>一键进入</span>
        </button>

      </div>
    </main>
    <section class="apps">
      <div class="apps-title">全部功能入口</div>
      <div class="app-grid">
        <a class="app-card" href="/world"><i class="fa-solid fa-globe"></i><span>世界</span></a>
        <a class="app-card" href="/video/"><i class="fa-solid fa-film"></i><span>视频</span></a>
        <a class="app-card" href="/play/"><i class="fa-solid fa-play"></i><span>解析</span></a>
        <a class="app-card" href="/user/profile"><i class="fa-solid fa-user-gear"></i><span>用户中心</span></a>
        <a class="app-card" href="/chat/"><i class="fa-solid fa-comments"></i><span>聊天室</span></a>
        <a class="app-card" href="/cg/"><i class="fa-solid fa-image"></i><span>CG</span></a>
        <a class="app-card" href="/articles/"><i class="fa-solid fa-newspaper"></i><span>文章</span></a>
        <a class="app-card" href="/J1/"><i class="fa-solid fa-link"></i><span>J1</span></a>
        <a class="app-card" href="/tv/"><i class="fa-solid fa-tv"></i><span>直播</span></a>
        <a class="app-card" href="/stripchatgirls/"><i class="fa-solid fa-users"></i><span>Stripchat</span></a>
      </div>
    </section>
    <footer>
      <div class="social">
        <i class="fa-brands fa-github" onclick="socialJump('github')"></i>
        <div class="point"></div>
        <i class="fa-solid fa-house" onclick="socialJump('home')"></i>
        <div class="point"></div>
        <i class="fa-solid fa-envelope" onclick="socialJump('email')"></i>
      </div>
      <div class="power">
        Copyright © 2020
        <script>
          document.write(" - " + new Date().getFullYear());
        </script>
        <a href="#" target="_blank">無名</a>
      </div>
      <div class="icp">
        <a href="#" target="_blank">豫ICP备8888888888号-8</a>
      </div>
    </footer>
    <script>
      // 跟随系统主题
      const darkModeMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
      const toggleDarkMode = (darkModeMediaQuery) => {
        if (darkModeMediaQuery.matches) {
          document.documentElement.classList.add("dark-mode");
        } else {
          document.documentElement.classList.remove("dark-mode");
        }
      };
      darkModeMediaQuery.addListener(toggleDarkMode);
      toggleDarkMode(darkModeMediaQuery);

      // 按钮事件
      const clickFunction = () => {
        window.location.href = "/world";
      };

      // 社交链接跳转
      const socialJump = (type) => {
        switch (type) {
          case "github":
            window.location.href = "#";
            break;
          case "home":
            window.location.href = "#";
            break;
          case "email":
            window.location.href = "#";
            break;
          default:
            break;
        }
      };
      
      // 加载条功能
      const loadingBar = document.getElementById('loadingBar');
      const loadingProgress = document.getElementById('loadingProgress');
      let loadingInterval;
      
      // 开始加载动画
      const startLoading = () => {
        loadingBar.classList.add('active');
        loadingProgress.style.width = '0%';
        let progress = 0;
        loadingInterval = setInterval(() => {
          progress += Math.random() * 10;
          if (progress > 90) progress = 90;
          loadingProgress.style.width = progress + '%';
        }, 100);
      };
      
      // 结束加载动画
      const endLoading = () => {
        clearInterval(loadingInterval);
        loadingProgress.style.width = '100%';
        setTimeout(() => {
          loadingBar.classList.remove('active');
        }, 300);
      };
      
      // 监听所有链接点击
      document.querySelectorAll('a, button').forEach(element => {
        element.addEventListener('click', (e) => {
          // 排除社交媒体链接和邮件链接
          if (element.href && (element.href.includes('#') || element.href.includes('mailto:'))) {
            return;
          }
          // 开始加载动画
          startLoading();
        });
      });
      
      // 页面加载完成后结束动画
      window.addEventListener('load', endLoading);
    </script>
    <script src="/assets/page-permission.js"></script>
    <script src="/assets/announcement.js"></script>
  </body>
</html>
