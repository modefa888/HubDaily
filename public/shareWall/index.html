<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/video/favicon.ico">
    <link rel="shortcut icon" href="/video/favicon.ico">
    <title>分享墙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                        accent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-effect {
                @apply backdrop-blur-md bg-white/80 border border-white/20;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-xl hover:-translate-y-1;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }
    </style>
    
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .masonry-grid {
            column-count: 1;
            column-gap: 16px;
        }
        @media (min-width: 640px) {
            .masonry-grid {
                column-count: 2;
            }
        }
        @media (min-width: 768px) {
            .masonry-grid {
                column-count: 3;
            }
        }
        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 4;
            }
        }
        @media (min-width: 1280px) {
            .masonry-grid {
                column-count: 5;
            }
        }
        .video-card {
            break-inside: avoid;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .video-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .video-card img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease, opacity 0.5s ease;
            opacity: 0;
        }
        .video-card img.loaded {
            opacity: 1;
        }
        .video-card:hover img {
            transform: scale(1.05);
        }
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            color: white;
            padding: 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .video-card:hover .video-overlay {
            transform: translateY(0);
        }
        .video-card .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .video-card:hover .play-overlay {
            opacity: 1;
        }
        .video-card .play-overlay i {
            font-size: 48px;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        .video-card .title {
            font-size: 14px;
            font-weight: 500;
            color: white;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .video-card .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }
        .video-card .source-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-radius: 4px;
            font-size: 11px;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%);
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 8px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-white">
    <!-- Age Verification Modal -->
    <div id="ageVerificationModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-slate-800 rounded-xl p-8 max-w-md w-full text-center">
            <h2 class="text-2xl font-bold mb-4 text-white">年龄验证</h2>
            <p class="text-slate-300 mb-8">请确认您已年满18周岁</p>
            <div class="flex justify-center space-x-4">
                <button id="ageVerifyYes" class="px-6 py-3 bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors text-white font-medium">
                    成年了，进入
                </button>
                <button id="ageVerifyNo" class="px-6 py-3 bg-slate-600 rounded-lg hover:bg-slate-500 transition-colors text-white font-medium">
                    未成年，退出
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-3">
                <i class="fa fa-th-large text-blue-400 text-2xl"></i>
                <h1 class="text-2xl font-bold">分享墙</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="searchButton" class="text-sm text-slate-400 hover:text-white transition-colors" onclick="toggleSearchBox()">
                    <i class="fa fa-search mr-1"></i> 本地搜索
                </button>
                <a href="/video/index.html" class="text-sm text-slate-400 hover:text-white transition-colors">
                    <i class="fa fa-video-camera mr-1"></i> 视频搜索
                </a>
            </div>
        </header>

        <!-- Search Box -->
        <div id="searchBox" class="mb-6 hidden">
            <div class="flex items-center bg-slate-800 rounded-lg p-2">
                <input type="text" id="searchInput" placeholder="搜索视频..." class="flex-1 bg-transparent border-none outline-none text-white px-3">
                <button id="searchSubmit" onclick="performSearch()" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fa fa-search mr-1"></i> 搜索
                </button>
                <button id="searchCancel" onclick="toggleSearchBox()" class="ml-2 px-3 py-2 bg-slate-700 rounded-lg hover:bg-slate-600 transition-colors">
                    <i class="fa fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Video Grid -->
        <div id="videoGrid" class="masonry-grid">
            <!-- Loading Skeletons -->
            <div class="video-card loading-skeleton" style="height: 400px;"></div>
            <div class="video-card loading-skeleton" style="height: 350px;"></div>
            <div class="video-card loading-skeleton" style="height: 450px;"></div>
            <div class="video-card loading-skeleton" style="height: 380px;"></div>
            <div class="video-card loading-skeleton" style="height: 420px;"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fa fa-inbox text-6xl text-slate-600 mb-4"></i>
            <p class="text-slate-400">暂无分享内容</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-20">
            <i class="fa fa-exclamation-circle text-6xl text-red-500 mb-4"></i>
            <p class="text-slate-400 mb-4">加载失败</p>
            <button onclick="loadShareWall()" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                重试
            </button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let originalVideos = [];
        let currentPage = 1;
        const pageSize = 24;
        let filteredVideos = [];

        async function loadShareWall() {
            const grid = document.getElementById('videoGrid');
            const emptyState = document.getElementById('emptyState');
            const errorState = document.getElementById('errorState');

            try {
                // 显示加载状态
                grid.innerHTML = `
                    <div class="video-card loading-skeleton" style="height: 400px;"></div>
                    <div class="video-card loading-skeleton" style="height: 350px;"></div>
                    <div class="video-card loading-skeleton" style="height: 450px;"></div>
                    <div class="video-card loading-skeleton" style="height: 380px;"></div>
                    <div class="video-card loading-skeleton" style="height: 420px;"></div>
                `;
                emptyState.classList.add('hidden');
                errorState.classList.add('hidden');
                
                const response = await fetch(`${API_BASE}/share-wall`);
                const data = await response.json();

                if (data.code === 200 && data.data && data.data.length > 0) {
                    originalVideos = data.data;
                    filteredVideos = data.data;
                    currentPage = 1;
                    renderVideosWithPagination();
                    renderPagination();
                    emptyState.classList.add('hidden');
                    errorState.classList.add('hidden');
                } else {
                    originalVideos = [];
                    filteredVideos = [];
                    grid.innerHTML = '';
                    hidePagination();
                    emptyState.classList.remove('hidden');
                    errorState.classList.add('hidden');
                }
            } catch (error) {
                console.error('加载分享墙失败:', error);
                originalVideos = [];
                filteredVideos = [];
                grid.innerHTML = '';
                hidePagination();
                errorState.classList.remove('hidden');
                emptyState.classList.add('hidden');
            }
        }

        function renderVideosWithPagination() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageVideos = filteredVideos.slice(start, end);
            renderVideos(pageVideos);
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredVideos.length / pageSize);
            if (totalPages <= 1) {
                hidePagination();
                return;
            }

            let paginationHTML = `
                <div class="flex justify-center items-center space-x-2 mt-8">
                    <button onclick="changePage(1)" class="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}">
                        <i class="fa fa-angle-double-left"></i>
                    </button>
                    <button onclick="changePage(${currentPage - 1})" class="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}">
                        <i class="fa fa-angle-left"></i>
                    </button>
            `;

            // 显示当前页附近的页码
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, startPage + 4);

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <button onclick="changePage(${i})" class="px-4 py-2 ${i === currentPage ? 'bg-blue-600' : 'bg-slate-800'} rounded-lg hover:bg-slate-700 transition-colors">
                        ${i}
                    </button>
                `;
            }

            paginationHTML += `
                    <button onclick="changePage(${currentPage + 1})" class="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}">
                        <i class="fa fa-angle-right"></i>
                    </button>
                    <button onclick="changePage(${totalPages})" class="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}">
                        <i class="fa fa-angle-double-right"></i>
                    </button>
                </div>
            `;

            // 检查是否存在分页容器，不存在则创建
            let paginationContainer = document.getElementById('paginationContainer');
            if (!paginationContainer) {
                paginationContainer = document.createElement('div');
                paginationContainer.id = 'paginationContainer';
                const container = document.querySelector('.max-w-7xl');
                container.appendChild(paginationContainer);
            }
            paginationContainer.innerHTML = paginationHTML;
        }

        function hidePagination() {
            const paginationContainer = document.getElementById('paginationContainer');
            if (paginationContainer) {
                paginationContainer.innerHTML = '';
            }
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredVideos.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderVideosWithPagination();
            renderPagination();
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleSearchBox() {
            const searchBox = document.getElementById('searchBox');
            const isHidden = searchBox.classList.contains('hidden');
            const emptyState = document.getElementById('emptyState');
            
            if (!isHidden) {
                // 关闭搜索框时，显示所有视频并恢复空状态默认文本
                document.getElementById('searchInput').value = '';
                filteredVideos = originalVideos;
                currentPage = 1;
                renderVideosWithPagination();
                renderPagination();
                // 恢复空状态默认文本
                const emptyText = emptyState.querySelector('p');
                if (emptyText) {
                    emptyText.textContent = '暂无分享内容';
                }
                emptyState.classList.add('hidden');
            }
            
            searchBox.classList.toggle('hidden');
            
            if (!searchBox.classList.contains('hidden')) {
                document.getElementById('searchInput').focus();
            }
        }

        function performSearch() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const grid = document.getElementById('videoGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (!searchTerm) {
                filteredVideos = originalVideos;
                currentPage = 1;
                renderVideosWithPagination();
                renderPagination();
                emptyState.classList.add('hidden');
                return;
            }

            filteredVideos = originalVideos.filter(video => {
                const title = (video.title || '').toLowerCase();
                const source = (video.source || '').toLowerCase();
                return title.includes(searchTerm) || source.includes(searchTerm);
            });

            if (filteredVideos.length === 0) {
                grid.innerHTML = '';
                hidePagination();
                emptyState.classList.remove('hidden');
                // 修改空状态文本
                const emptyText = emptyState.querySelector('p');
                if (emptyText) {
                    emptyText.textContent = `未找到与"${searchTerm}"相关的视频`;
                }
            } else {
                currentPage = 1;
                renderVideosWithPagination();
                renderPagination();
                emptyState.classList.add('hidden');
            }
        }

        // 监听回车键
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        performSearch();
                    }
                });
            }
        });

        function getExpireLabel(expiresAt) {
            if (!expiresAt || expiresAt === 0) return '永久';
            const diff = expiresAt - Date.now();
            if (diff <= 0) return '已过期';
            const minutes = Math.ceil(diff / 60000);
            if (minutes < 60) return `${minutes}分钟后过期`;
            const hours = Math.ceil(diff / 3600000);
            if (hours < 24) return `${hours}小时后过期`;
            const days = Math.ceil(diff / 86400000);
            return `${days}天后过期`;
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(video => {
                const shareUrl = `/video/share?sid=${encodeURIComponent(video.shareId)}`;
                const expireLabel = getExpireLabel(video.expiresAt);
                return `
                    <div class="video-card" onclick="window.location.href='${shareUrl}'">
                        <img src="${video.pic || '/video/loading.gif'}" 
                             alt="${video.title}" 
                             loading="lazy"
                             onload="this.classList.add('loaded')"
                             onerror="this.src='/video/loading.gif'; this.classList.add('loaded')">
                        <div class="play-overlay">
                            <i class="fa fa-play-circle"></i>
                        </div>
                        <div class="video-overlay">
                            <div class="title">${escapeHtml(video.title)}</div>
                            <div class="meta">
                                <span class="source-badge">${escapeHtml(video.source || '未知')}</span>
                                ${video.year ? `<span>${video.year}</span>` : ''}
                            </div>
                            <div class="meta flex justify-end">
                                <span class="text-xs text-yellow-400">${expireLabel}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Age verification
        document.addEventListener('DOMContentLoaded', function() {
            const ageModal = document.getElementById('ageVerificationModal');
            const ageVerifyYes = document.getElementById('ageVerifyYes');
            const ageVerifyNo = document.getElementById('ageVerifyNo');

            // 检查是否已经验证过
            const isVerified = localStorage.getItem('ageVerified');
            if (isVerified === 'true') {
                ageModal.classList.add('hidden');
                loadShareWall();
                return;
            }

            ageVerifyYes.addEventListener('click', function() {
                // 存储验证状态
                localStorage.setItem('ageVerified', 'true');
                ageModal.classList.add('hidden');
                loadShareWall();
            });

            ageVerifyNo.addEventListener('click', function() {
                // 重定向到一个安全页面或关闭窗口
                window.location.href = '/video/index.html';
            });
        });
    </script>
</body>
</html>
