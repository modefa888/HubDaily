<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/video/favicon.ico">
    <link rel="shortcut icon" href="/video/favicon.ico">
    <title>分享墙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                        accent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-effect {
                @apply backdrop-blur-md bg-white/80 border border-white/20;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-xl hover:-translate-y-1;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }
    </style>
    
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .video-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.8);
            transition: all 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .video-card .thumb-wrapper {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
        }
        .video-card .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .video-card:hover .thumb-wrapper img {
            transform: scale(1.05);
        }
        .video-card .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        .video-card:hover .play-overlay {
            opacity: 1;
        }
        .video-card .play-overlay i {
            font-size: 48px;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        .video-card .info {
            padding: 12px;
        }
        .video-card .title {
            font-size: 14px;
            font-weight: 500;
            color: white;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .video-card .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }
        .video-card .source-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-radius: 4px;
            font-size: 11px;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-3">
                <i class="fa fa-th-large text-blue-400 text-2xl"></i>
                <h1 class="text-2xl font-bold">分享墙</h1>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/video/index.html" class="text-sm text-slate-400 hover:text-white transition-colors">
                    <i class="fa fa-video-camera mr-1"></i> 视频搜索
                </a>
            </div>
        </header>

        <!-- Video Grid -->
        <div id="videoGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
            <!-- Loading Skeletons -->
            <div class="video-card loading-skeleton" style="height: 280px;"></div>
            <div class="video-card loading-skeleton" style="height: 280px;"></div>
            <div class="video-card loading-skeleton" style="height: 280px;"></div>
            <div class="video-card loading-skeleton" style="height: 280px;"></div>
            <div class="video-card loading-skeleton" style="height: 280px;"></div>
            <div class="video-card loading-skeleton" style="height: 280px;"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fa fa-inbox text-6xl text-slate-600 mb-4"></i>
            <p class="text-slate-400">暂无分享内容</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-20">
            <i class="fa fa-exclamation-circle text-6xl text-red-500 mb-4"></i>
            <p class="text-slate-400 mb-4">加载失败</p>
            <button onclick="loadShareWall()" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                重试
            </button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function loadShareWall() {
            const grid = document.getElementById('videoGrid');
            const emptyState = document.getElementById('emptyState');
            const errorState = document.getElementById('errorState');

            try {
                const response = await fetch(`${API_BASE}/share-wall`);
                const data = await response.json();

                if (data.code === 200 && data.data && data.data.length > 0) {
                    renderVideos(data.data);
                    emptyState.classList.add('hidden');
                    errorState.classList.add('hidden');
                } else {
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    errorState.classList.add('hidden');
                }
            } catch (error) {
                console.error('加载分享墙失败:', error);
                grid.innerHTML = '';
                errorState.classList.remove('hidden');
                emptyState.classList.add('hidden');
            }
        }

        function getExpireLabel(expiresAt) {
            if (!expiresAt || expiresAt === 0) return '永久';
            const diff = expiresAt - Date.now();
            if (diff <= 0) return '已过期';
            const minutes = Math.ceil(diff / 60000);
            if (minutes < 60) return `${minutes}分钟后过期`;
            const hours = Math.ceil(diff / 3600000);
            if (hours < 24) return `${hours}小时后过期`;
            const days = Math.ceil(diff / 86400000);
            return `${days}天后过期`;
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(video => {
                const shareUrl = `/video/share?sid=${encodeURIComponent(video.shareId)}`;
                const expireLabel = getExpireLabel(video.expiresAt);
                return `
                    <div class="video-card" onclick="window.location.href='${shareUrl}'">
                        <div class="thumb-wrapper">
                            <img src="${video.pic || '/video/loading.gif'}" 
                                 alt="${video.title}" 
                                 loading="lazy"
                                 onerror="this.src='/video/loading.gif'">
                            <div class="play-overlay">
                                <i class="fa fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="info">
                            <div class="title">${escapeHtml(video.title)}</div>
                            <div class="meta">
                                <span class="source-badge">${escapeHtml(video.source || '未知')}</span>
                                ${video.year ? `<span>${video.year}</span>` : ''}
                            </div>
                            <div class="meta flex justify-end">
                                <span class="text-xs text-yellow-400">${expireLabel}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadShareWall);
    </script>
</body>
</html>
