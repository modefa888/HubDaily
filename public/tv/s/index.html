        </div>
        <div class="flex items-center space-x-2">

  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded hidden z-[70]"></div>





  <script>
    const TOKEN_KEY = "userToken";
    const toast = (msg) => {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.remove("hidden");
      setTimeout(() => el.classList.add("hidden"), 1800);
    };

    const setLoading = (isLoading, text = "处理中...") => {
      // 不再使用加载遮面，改为使用骨架屏
      // 骨架屏的显示和隐藏已经在各个加载函数中处理
    };

    const getToken = () => localStorage.getItem(TOKEN_KEY) || "";
    const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
    const clearToken = () => localStorage.removeItem(TOKEN_KEY);

    // 电视管理相关功能
    let currentChannelId = null;
    let currentVideoId = null;
    let channelsData = []; // 缓存频道数据
    let channelsLoaded = false; // 标记频道数据是否已加载
    let sharesLoaded = false; // 标记分享数据是否已加载
    
    // 加载频道列表
    const loadChannelsData = async () => {
      try {
        // 显示骨架屏
        document.getElementById('channelsSkeleton').classList.remove('hidden');
        document.getElementById('channelsList').classList.add('hidden');
        
        if (!channelsLoaded) {
          const response = await fetch('/api/admin/tv/channels', {
            headers: {
              'Authorization': `Bearer ${localStorage.getItem(TOKEN_KEY)}`

    // 分页相关变量

      const paginatedVideos = videos.slice(startIndex, endIndex);
      
      // 渲染视频列表

        saveVideoBtn.addEventListener('click', saveVideo);
      }
      
      // 视频封面预览
      const videoImageInput = document.getElementById('videoImageInput');
      const videoImagePreview = document.getElementById('videoImagePreview');
      if (videoImageInput && videoImagePreview) {
        videoImageInput.addEventListener('input', function() {
          const url = this.value.trim();
          if (url) {
            videoImagePreview.src = url;
            videoImagePreview.classList.remove('hidden');
          } else {
            videoImagePreview.src = '';
            videoImagePreview.classList.add('hidden');
          }
        });
      }
      
      // 从分享链接添加视频
      const addFromShareBtn = document.getElementById('addFromShareBtn');
      if (addFromShareBtn) {
        addFromShareBtn.addEventListener('click', async () => {
          const shareUrlInput = document.getElementById('shareUrlInput');
          const shareUrl = shareUrlInput.value.trim();
          
          if (!shareUrl) {
            toast('请输入分享链接');
            return;
          }
          
          if (!videoChannelSelect.value) {
            toast('请先选择频道');
            return;
          }
          
          try {
            setLoading(true, "处理分享链接...");
            
            // 从分享链接中提取分享ID
            const shareId = extractShareIdFromUrl(shareUrl);
            if (!shareId) {
              toast('无效的分享链接');
              return;
            }
            
            // 获取分享信息
            const shareResponse = await fetch(`/api/share/${shareId}`, {
              headers: authHeaders()
            });
            
            const shareData = await shareResponse.json();
            if (shareData.code !== 200) {
              toast(shareData.message || '获取分享信息失败');
              return;
            }
            
            const videoData = shareData.data;
            if (!videoData || !videoData.url) {
              toast('分享信息不完整');
              return;
            }
            
            // 显示视频编辑表单并传递视频数据
            currentChannelId = videoChannelSelect.value;
            showVideoEditForm({
              title: videoData.title || '未命名视频',
              url: (videoData.url || '').replace(/`/g, '').trim(),
              image: (videoData.pic || '').replace(/`/g, '').trim(),
              order: 1
            });
            
            toast('已从分享链接提取视频信息');
          } catch (error) {
            console.error('从分享添加视频失败:', error);
            toast('从分享添加视频失败');
          } finally {
            setLoading(false);
          }
        });
      }
    };

    const authHeaders = () => {
      const token = getToken();
      return token ? { Authorization: "Bearer " + token } : {};
    };

    // 检查认证状态
    const checkAuthStatus = () => {
      const token = getToken();
      const authStatus = document.getElementById('authStatus');
      const logoutBtn = document.getElementById('logoutBtn');
      
      if (token) {
        // 有token，显示已登录状态
        if (authStatus) {
          authStatus.textContent = '已登录';
        }
        if (logoutBtn) {
          logoutBtn.classList.remove('hidden');
        }
        
        // 初始化电视管理功能
        initTvManagement();
        loadChannelsData();
      } else {
        // 无token，跳转到登录页面
        // 使用URL参数传递重定向地址
        window.location.href = `/login?redirect=${encodeURIComponent(window.location.href)}`;
      }
    };
    

    
    // 渲染频道选择项
    const renderChannelSelection = () => {
      const grid = document.getElementById('channelSelectionGrid');
      if (!grid) return;
      
      grid.innerHTML = '';
      channelsData.forEach(channel => {
        const item = document.createElement('div');
        item.className = 'flex items-center gap-2';
        item.innerHTML = `
          <input type="checkbox" id="channel_${channel._id}" class="channel-checkbox" value="${channel._id}">
          <label for="channel_${channel._id}" class="text-sm">${channel.name}</label>
        `;
        grid.appendChild(item);
      });
    };
    
    // 生成TV分享
    const generateTVShare = async () => {
      // 获取选中的频道
      const checkboxes = document.querySelectorAll('.channel-checkbox:checked');
      const selectedChannelIds = Array.from(checkboxes).map(cb => cb.value);
      
      if (selectedChannelIds.length === 0) {
        toast('请至少选择一个频道');
        return;
      }
      
      // 获取分享名称、TV ID和是否固定
      const shareName = document.getElementById('shareNameInput').value.trim();
      const shareTvId = document.getElementById('shareTvIdInput').value.trim();
      const shareIsFixed = document.getElementById('shareIsFixedInput').checked;
      
      try {
        setLoading(true, '生成分享链接...');
        
        // 检查是否存在固定分享
        if (shareIsFixed) {
          const sharesResponse = await fetch('/api/admin/tv/shares', {
            headers: {
              'Authorization': `Bearer ${getToken()}`
            }
          });
          const sharesData = await sharesResponse.json();
          
          if (sharesData.code === 200 && sharesData.data) {
            const hasFixedShare = sharesData.data.some(s => s.isFixed);
            if (hasFixedShare) {
              toast('已存在固定分享，无法创建新的固定分享');
              setLoading(false);
              return;
            }
          }
        }
        
        // 调用后端接口创建TV分享
        const response = await fetch('/api/admin/tv/shares', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem(TOKEN_KEY)}`
          },
          body: JSON.stringify({
            channelIds: selectedChannelIds,
            name: shareName,
            tvId: shareTvId,
            isFixed: shareIsFixed
          })
        });
        
        const data = await response.json();
        if (data.code === 200) {
          // 生成分享链接
          const shareUrl = `${window.location.origin}/tv?tvID=${data.data._id}`;
          
          // 复制到剪贴板
          await navigator.clipboard.writeText(shareUrl);
          toast('分享链接已生成并复制到剪贴板');
          
          // 隐藏频道选择区域
          document.getElementById('channelSelectionSection').classList.add('hidden');
          
          // 刷新分享列表
          loadSharesList();
        } else {
          toast(data.message || '生成分享失败');
        }
      } catch (error) {
        console.error('生成分享失败:', error);
        toast('生成分享失败，请重试');
      } finally {
        setLoading(false);
      }
    };
    
    // 加载分享列表
    const loadSharesList = async () => {
      try {
        // 显示骨架屏
        document.getElementById('sharesSkeleton').classList.remove('hidden');
        document.getElementById('sharesList').classList.add('hidden');
        
        // 调用后端接口获取分享列表
        const response = await fetch('/api/admin/tv/shares', {
          headers: {
            'Authorization': `Bearer ${getToken()}`
          }
        });
        
        const data = await response.json();
        if (data && data.code === 200) {
          renderSharesList(data.data);
          sharesLoaded = true; // 标记分享数据已加载
        } else {
          toast(data?.message || '加载分享列表失败');
          renderSharesList([]);
        }
      } catch (error) {
        console.error('加载分享列表失败:', error);
        toast('加载分享列表失败');
        renderSharesList([]);
      } finally {
        // 隐藏骨架屏，显示实际数据
        document.getElementById('sharesSkeleton').classList.add('hidden');
        document.getElementById('sharesList').classList.remove('hidden');
      }
    };
    
    // 渲染分享列表
    const renderSharesList = (shares) => {
      const tbody = document.getElementById('sharesTbody');
      if (!tbody) return;
      
      tbody.innerHTML = '';
      
      // 检查是否存在固定分享
      const hasFixedShare = shares && shares.some(share => share.isFixed);
      
      // 禁用或启用固定分享复选框
      const shareIsFixedInput = document.getElementById('shareIsFixedInput');
      if (shareIsFixedInput) {
        if (hasFixedShare) {
          shareIsFixedInput.disabled = true;
          shareIsFixedInput.checked = false;
        } else {
          shareIsFixedInput.disabled = false;
        }
      }
      
      if (!shares || shares.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td class="py-3 text-center text-slate-500" colspan="3">暂无分享记录</td>';
        tbody.appendChild(tr);
      } else {
        shares.forEach(share => {
          const tr = document.createElement('tr');
          const channelNames = share.channels && Array.isArray(share.channels) ? share.channels.map(c => c.name).join(', ') : '无频道';
          const shareUrl = `${window.location.origin}/tv?tvID=${share._id || share.id}`;
          const fixedBadge = share.isFixed ? '<span class="ml-2 px-2 py-0.5 bg-yellow-100 text-yellow-800 text-xs rounded">固定</span>' : '';
          const shareId = share._id || share.id;
          
          tr.innerHTML = `
            <td>${shareId}${fixedBadge}</td>
            <td>${channelNames}</td>
            <td>
              <button class="text-blue-600 hover:underline mr-2 copy-share-btn" data-url="${shareUrl}">复制链接</button>
              <button class="text-green-600 hover:underline mr-2 edit-share-btn" data-id="${shareId}">编辑</button>
              <button class="text-red-600 hover:underline delete-share-btn" data-id="${shareId}">删除</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
        
        // 绑定复制链接按钮事件
        document.querySelectorAll('.copy-share-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const url = this.getAttribute('data-url');
            navigator.clipboard.writeText(url).then(() => {
              toast('链接已复制到剪贴板');
            }).catch(err => {
              console.error('复制失败:', err);
              toast('复制失败，请手动复制链接');
            });
          });
        });
        
        // 绑定删除分享按钮事件
        document.querySelectorAll('.delete-share-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const shareId = this.getAttribute('data-id');
            // 显示删除确认模态框
            document.getElementById('deleteConfirmModal').classList.remove('hidden');
            // 存储当前要删除的分享ID
            window.currentDeleteShareId = shareId;
          });
        });
        
        // 绑定编辑分享按钮事件
        document.querySelectorAll('.edit-share-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const shareId = this.getAttribute('data-id');
            editShare(shareId);
          });
        });
      }
    };
    
    // 渲染编辑分享表单中的频道选择项
    const renderEditChannelSelection = (selectedChannelIds = []) => {
      const channelSelectionGrid = document.getElementById('editChannelSelectionGrid');
      if (!channelSelectionGrid) return;
      
      channelSelectionGrid.innerHTML = '';
      
      if (!channelsData || channelsData.length === 0) {
        channelSelectionGrid.innerHTML = '<div class="col-span-full text-center text-slate-500">暂无频道数据</div>';
        return;
      }
      
      channelsData.forEach(channel => {
        const channelItem = document.createElement('div');
        channelItem.className = 'flex items-center gap-2';
        
        const isSelected = selectedChannelIds.some(id => id === channel._id || id === channel.id);
        
        channelItem.innerHTML = `
          <input type="checkbox" id="edit_channel_${channel._id || channel.id}" class="edit-channel-checkbox" value="${channel._id || channel.id}" ${isSelected ? 'checked' : ''}>
          <label for="edit_channel_${channel._id || channel.id}" class="text-sm">${channel.name}</label>
        `;
        
        channelSelectionGrid.appendChild(channelItem);
      });
    };
    
    // 编辑分享
    const editShare = async (shareId) => {
      try {
        setLoading(true, '加载分享数据...');
        
        // 确保频道数据已加载
        if (!channelsLoaded) {
          await loadChannelsData();
        }
        
        // 调用后端接口获取分享详情
        const response = await fetch(`/api/tv/shares/${shareId}`);
        const data = await response.json();
        
        if (data.code === 200 && data.data) {
          const share = data.data;
          
          // 填充编辑表单
          document.getElementById('editShareNameInput').value = share.name;
          document.getElementById('editShareTvIdInput').value = share._id || share.id;
          document.getElementById('editShareIsFixedInput').checked = share.isFixed || false;
          
          // 检查是否存在其他固定分享
          const sharesResponse = await fetch('/api/admin/tv/shares', {
            headers: {
              'Authorization': `Bearer ${getToken()}`
            }
          });
          const sharesData = await sharesResponse.json();
          
          if (sharesData.code === 200 && sharesData.data) {
            const hasOtherFixedShare = sharesData.data.some(s => s.isFixed && (s._id || s.id) !== shareId);
            
            // 禁用或启用固定分享复选框
            const editShareIsFixedInput = document.getElementById('editShareIsFixedInput');
            if (editShareIsFixedInput) {
              if (hasOtherFixedShare && !share.isFixed) {
                editShareIsFixedInput.disabled = true;
                editShareIsFixedInput.checked = false;
              } else {
                editShareIsFixedInput.disabled = false;
              }
            }
          }
          
          // 渲染频道选择项
          const selectedChannelIds = share.channelIds || (share.channels && share.channels.map(c => c._id || c.id)) || [];
          renderEditChannelSelection(selectedChannelIds);
          
          // 显示编辑表单
          document.getElementById('shareEditForm').classList.remove('hidden');
          
          // 保存当前编辑的分享ID
          window.currentEditShareId = shareId;
        } else {
          toast(data.message || '加载分享数据失败');
        }
      } catch (error) {
        console.error('加载分享数据失败:', error);
        toast('加载分享数据失败，请重试');
      } finally {
        setLoading(false);
      }
    };
    
    // 保存分享修改
    const saveShareEdit = async () => {
      const shareId = window.currentEditShareId;
      if (!shareId) {
        toast('请先选择要编辑的分享');
        return;
      }
      
      // 获取选中的频道
      const checkboxes = document.querySelectorAll('.edit-channel-checkbox:checked');
      const selectedChannelIds = Array.from(checkboxes).map(cb => cb.value);
      
      if (selectedChannelIds.length === 0) {
        toast('请至少选择一个频道');
        return;
      }
      
      // 获取编辑表单数据
      const shareName = document.getElementById('editShareNameInput').value.trim();
      const shareIsFixed = document.getElementById('editShareIsFixedInput').checked;
      
      try {
        setLoading(true, '保存修改...');
        
        // 检查是否存在其他固定分享
        if (shareIsFixed) {
          const sharesResponse = await fetch('/api/admin/tv/shares', {
            headers: {
              'Authorization': `Bearer ${getToken()}`
            }
          });
          const sharesData = await sharesResponse.json();
          
          if (sharesData.code === 200 && sharesData.data) {
            const hasOtherFixedShare = sharesData.data.some(s => s.isFixed && (s._id || s.id) !== shareId);
            if (hasOtherFixedShare) {
              toast('已存在固定分享，无法设置新的固定分享');
              setLoading(false);
              return;
            }
          }
        }
        
        // 调用后端接口更新分享
        const response = await fetch(`/api/admin/tv/shares/${shareId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem(TOKEN_KEY)}`
          },
          body: JSON.stringify({
            channelIds: selectedChannelIds,
            name: shareName,
            isFixed: shareIsFixed
          })
        });
        
        const data = await response.json();
        if (data.code === 200) {
          toast('保存修改成功');
          hideShareEditForm();
          loadSharesList();
        } else {
          toast(data.message || '保存修改失败');
        }
      } catch (error) {
        console.error('保存修改失败:', error);
        toast('保存修改失败，请重试');
      } finally {
        setLoading(false);
      }
    };
    
    // 隐藏编辑表单
    const hideShareEditForm = () => {
      document.getElementById('shareEditForm').classList.add('hidden');
      window.currentEditShareId = null;
    };
    
    // 删除分享
    const deleteShare = async (shareId) => {
      try {
        setLoading(true, '删除分享...');
        
        // 调用后端接口删除分享
        const response = await fetch(`/api/admin/tv/shares/${shareId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem(TOKEN_KEY)}`
          }
        });
        
        const data = await response.json();
        if (data.code === 200) {
          toast('分享已删除');
          loadSharesList();
        } else {
          toast(data.message || '删除分享失败');
        }
      } catch (error) {
        console.error('删除分享失败:', error);
        toast('删除分享失败，请重试');
      } finally {
        setLoading(false);
      }
    };
    
    // 退出登录
    const logout = () => {
      clearToken();
      checkAuthStatus();
      toast('已退出登录');
    };
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 首先检查认证状态
      checkAuthStatus();
      
      // 绑定退出登录按钮事件
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', logout);
      }
      
      // 绑定TV分享管理相关按钮事件
      const generateShareBtn = document.getElementById('generateShareBtn');
      if (generateShareBtn) {
        generateShareBtn.addEventListener('click', generateTVShare);
      }
      
      const refreshSharesBtn = document.getElementById('refreshSharesBtn');
      if (refreshSharesBtn) {
        refreshSharesBtn.addEventListener('click', () => {
          sharesLoaded = false; // 重置分享数据加载状态
          loadSharesList(); // 重新加载分享列表
        });
      }
      
      // 绑定编辑分享表单按钮事件
      const saveEditShareBtn = document.getElementById('saveEditShareBtn');
      if (saveEditShareBtn) {
        saveEditShareBtn.addEventListener('click', saveShareEdit);
      }
      
      const cancelEditShareBtn = document.getElementById('cancelEditShareBtn');
      if (cancelEditShareBtn) {
        cancelEditShareBtn.addEventListener('click', hideShareEditForm);
      }
      
      // 绑定添加分享频道按钮事件
      const addShareChannelBtn = document.getElementById('addShareChannelBtn');
      if (addShareChannelBtn) {
        addShareChannelBtn.addEventListener('click', () => {
          document.getElementById('channelSelectionSection').classList.remove('hidden');
        });
      }
      
      // 绑定保存分享按钮事件
      const saveShareBtn = document.getElementById('saveShareBtn');
      if (saveShareBtn) {
        saveShareBtn.addEventListener('click', generateTVShare);
      }
      
      // 绑定取消频道选择按钮事件
      const cancelChannelSelectionBtn = document.getElementById('cancelChannelSelectionBtn');
      if (cancelChannelSelectionBtn) {
        cancelChannelSelectionBtn.addEventListener('click', () => {
          document.getElementById('channelSelectionSection').classList.add('hidden');
        });
      }
      
      // 绑定删除确认模态框按钮事件
      const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
      if (cancelDeleteBtn) {
        cancelDeleteBtn.addEventListener('click', () => {
          document.getElementById('deleteConfirmModal').classList.add('hidden');
        });
      }
      
      const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
      if (confirmDeleteBtn) {
        confirmDeleteBtn.addEventListener('click', () => {
          const shareId = window.currentDeleteShareId;
          if (shareId) {
            deleteShare(shareId);
          }
          document.getElementById('deleteConfirmModal').classList.add('hidden');
        });
      }
    });
    
    // 全局函数，用于HTML中的onclick调用
    window.editChannel = editChannel;
    window.switchToVideoManagement = switchToVideoManagement;
    window.deleteChannel = deleteChannel;

  </script>
</body>
</html>
