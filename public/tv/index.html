<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/tv/favicon.ico">
    <link rel="shortcut icon" href="/tv/favicon.ico">
    <title>TV分享墙 - v2.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- DPlayer -->
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <!-- hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                        accent: '#f59e0b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body {
            background-color: #f3f4f6;
            color: #333;
        }
        
        .video-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .video-thumb {
            transition: opacity 0.3s ease;
        }
        
        .video-thumb:hover .privacy-mask {
            opacity: 0.5;
        }
        
        .privacy-mask {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        
        .scroll-offset {
            scroll-margin-top: 80px;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md fixed top-0 left-0 right-0 z-40">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-television text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">TV分享墙</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="refreshButton" class="text-gray-600 hover:text-primary">
                    <i class="fa fa-refresh mr-1"></i> 刷新
                </button>
                <button id="backToVideoButton" class="text-gray-600 hover:text-primary">
                    <i class="fa fa-arrow-left mr-1"></i> 返回视频页
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 pt-20 pb-12">
        <!-- 页面标题 -->
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">分享视频墙</h2>
            <p class="text-gray-600 mt-2">管理员分享的视频集合</p>
        </div>

        <!-- 视频列表 -->
        <div id="videoList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- 视频卡片将通过 JavaScript 动态生成 -->
        </div>

        <!-- 加载更多按钮 -->
        <div class="mt-8 text-center">
            <button id="loadMoreButton" class="btn-primary px-6 py-2 rounded-lg">
                <i class="fa fa-refresh mr-1"></i> 加载更多
            </button>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fa fa-film text-4xl text-gray-400 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-600">暂无分享视频</h3>
            <p class="text-gray-500 mt-2">管理员可以在视频页面分享视频到 TV 墙</p>
        </div>
    </main>

    <!-- 加载覆盖层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="text-gray-700">加载中...</p>
    </div>



    <script>
        // 全局变量
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        const FALLBACK_IMAGE = '../loading.gif';

        // DOM元素
        const videoList = document.getElementById('videoList');
        const loadMoreButton = document.getElementById('loadMoreButton');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const refreshButton = document.getElementById('refreshButton');
        const backToVideoButton = document.getElementById('backToVideoButton');

        // 初始化
        async function init() {
            try {
                loadingText.textContent = '加载分享视频...';
                await loadShareVideos();
            } catch (error) {
                console.error('初始化失败:', error);
                loadingText.textContent = '加载失败，请刷新页面';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 2000);
            }
        }

        // 加载分享视频
        async function loadShareVideos() {
            if (isLoading || !hasMore) return;
            
            isLoading = true;
            loadingOverlay.style.display = 'flex';
            loadingText.textContent = '加载分享视频...';
            
            try {
                const limit = 20;
                const response = await fetch(`/api/tv/shares?page=${currentPage}&limit=${limit}`);
                const data = await response.json();
                
                if (data.code === 200 && data.data && data.data.length > 0) {
                    renderShareVideos(data.data);
                    currentPage++;
                    hasMore = data.data.length === limit;
                    // 如果数据不足，隐藏加载更多按钮
                    if (!hasMore) {
                        loadMoreButton.classList.add('hidden');
                    }
                } else {
                    hasMore = false;
                    if (currentPage === 1) {
                        // 显示空状态
                        emptyState.classList.remove('hidden');
                        videoList.classList.add('hidden');
                        loadMoreButton.classList.add('hidden');
                    } else {
                        // 隐藏加载更多按钮
                        loadMoreButton.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error('加载分享视频失败:', error);
                showToast('加载失败，请重试');
            } finally {
                loadingOverlay.style.display = 'none';
                isLoading = false;
            }
        }

        // 渲染分享视频
        function renderShareVideos(videos) {
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg overflow-hidden shadow-md video-card';
                
                card.innerHTML = `
                    <div class="video-thumb relative aspect-[2/3] overflow-hidden cursor-pointer group"
                         onclick="openVideoPlayer('${video.shareId}')">
                        <img 
                            src="${FALLBACK_IMAGE}" 
                            data-src="${video.pic || ''}" 
                            alt="${video.title}" 
                            onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}';"
                            loading="lazy"
                            class="w-full h-full object-fill lazy-image transition-transform duration-500 group-hover:scale-110"
                        >
                        <div class="privacy-mask transition-opacity duration-300 group-hover:opacity-70"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="w-16 h-16 bg-primary/80 rounded-full flex items-center justify-center text-white text-2xl hover:bg-primary transition-colors duration-300">
                                <i class="fa fa-play"></i>
                            </div>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                            <div class="p-3 w-full">
                                <h3 class="text-white font-medium line-clamp-2">${video.title}</h3>
                            </div>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold mb-2 line-clamp-1">
                            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded mr-2">${video.source || '未知'}</span>
                            ${video.title}
                        </h3>
                        <div class="text-right">
                            <span class="countdown text-xs text-gray-500" data-expires="${video.expiresAt || 0}"></span>
                        </div>
                    </div>
                `;
                
                videoList.appendChild(card);
            });
            
            // 初始化懒加载
            initLazyLoading();
        }

        // 初始化懒加载
        function initLazyLoading() {
            const lazyImages = document.querySelectorAll('.lazy-image');
            if ('IntersectionObserver' in window) {
                const imageObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const image = entry.target;
                            image.src = image.dataset.src || FALLBACK_IMAGE;
                            imageObserver.unobserve(image);
                        }
                    });
                });
                lazyImages.forEach(img => imageObserver.observe(img));
            }
        }

        // 打开视频播放器
        function openVideoPlayer(shareId) {
            // 构建分享链接
            const baseUrl = window.location.origin;
            const shareUrl = `${baseUrl}/video/share?sid=${shareId}`;
            // 在新标签中打开分享链接
            window.open(shareUrl, '_blank');
        }



        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-50';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 2000);
        }

        // 更新倒计时
        function updateCountdowns() {
            const countdownElements = document.querySelectorAll('.countdown');
            countdownElements.forEach(element => {
                const expiresAt = Number(element.dataset.expires);
                if (!expiresAt) {
                    element.textContent = '永久有效';
                    return;
                }
                const now = Date.now();
                const timeLeft = expiresAt - now;
                if (timeLeft <= 0) {
                    element.textContent = '已过期';
                    return;
                }
                const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                let countdownText = '';
                if (days > 0) {
                    countdownText += `${days}天 `;
                }
                if (hours > 0) {
                    countdownText += `${hours}小时 `;
                }
                if (minutes > 0) {
                    countdownText += `${minutes}分钟 `;
                }
                if (seconds > 0) {
                    countdownText += `${seconds}秒`;
                }
                element.textContent = `有效期: ${countdownText.trim()}`;
            });
        }

        // 事件监听
        loadMoreButton.addEventListener('click', loadShareVideos);
        
        refreshButton.addEventListener('click', () => {
            // 重置状态
            currentPage = 1;
            hasMore = true;
            videoList.innerHTML = '';
            emptyState.classList.add('hidden');
            videoList.classList.remove('hidden');
            loadMoreButton.classList.remove('hidden');
            // 重新加载
            loadShareVideos();
        });
        
        backToVideoButton.addEventListener('click', () => {
            window.location.href = '../video/index.html';
        });

        // 初始化
        init();

        // 初始化倒计时
        updateCountdowns();
        // 每秒钟更新一次倒计时
        setInterval(updateCountdowns, 1000);
    </script>
</body>
</html>
