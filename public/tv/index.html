<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/tv/favicon.ico">
    <link rel="shortcut icon" href="/tv/favicon.ico">
    <title>电视机 - v2.0</title>
    <!-- Tailwind CSS -->
    <link href="https://unpkg.com/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- DPlayer -->
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <!-- hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                        accent: '#f59e0b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background-color: #000;
            color: #fff;
        }
        
        .tv-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        
        .tv-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        
        .tv-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        
        .channel-transition {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000;
            z-index: 15;
            animation: fadeOut 1s ease-out forwards;
        }
        
        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <!-- 未成年提示框 -->
    <div id="ageVerificationModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80">
        <div class="bg-white rounded-lg p-6 max-w-md w-full text-center">
            <div class="text-4xl mb-4 text-red-600">
                <i class="fa fa-exclamation-triangle"></i>
            </div>
            <h2 class="text-xl font-bold mb-2 text-gray-800">年龄验证</h2>
            <p class="text-gray-600 mb-6">本内容仅适合18岁以上成年人观看。请确认您已年满18周岁。</p>
            <div class="flex space-x-4 justify-center">
                <button id="ageVerifyYes" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                    我已年满18岁
                </button>
                <button id="ageVerifyNo" class="px-6 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition">
                    未满18岁
                </button>
            </div>
        </div>
    </div>
    <div class="tv-container">
        <div class="tv-screen">
            <!-- 播放器容器 -->
            <div id="dplayer" class="w-full h-full"></div>
            
            <!-- 加载覆盖层 -->
            <div id="loadingOverlay" class="loading-overlay">
                <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="loadingText" class="text-white">加载中...</p>
            </div>
            
            <!-- 频道切换过渡效果 -->
            <div id="channelTransition" class="channel-transition hidden"></div>
            
            <!-- 电视信息 -->
            <div class="tv-info">
                <div id="currentChannelName" class="text-lg font-semibold">加载中...</div>
                <div id="currentVideoTitle" class="text-sm opacity-80">准备就绪</div>
                <div id="channelList" class="mt-4">
                    <div class="text-xs font-medium opacity-70 mb-2">频道列表</div>
                    <div class="channel-list"></div>
                </div>
                <div id="videoList" class="mt-4 hidden">
                    <div class="text-xs font-medium opacity-70 mb-2 flex items-center">
                        <span>视频列表</span>
                        <button id="backToChannels" class="ml-2 text-primary hover:underline">返回</button>
                    </div>
                    <div class="video-list"></div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // 全局变量
        let dplayer = null;
        let channels = [];
        let currentChannelIndex = 0;
        let currentVideoIndex = 0;
        let currentVideoTime = 0;
        let isPlaying = false;
        let isLoading = true;
        const PLAYBACK_HISTORY_KEY = 'tvPlaybackHistory';
        
        // DOM元素
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const channelTransition = document.getElementById('channelTransition');
        const currentChannelName = document.getElementById('currentChannelName');
        const currentVideoTitle = document.getElementById('currentVideoTitle');
        
        // 年龄验证
        const ageVerificationModal = document.getElementById('ageVerificationModal');
        const ageVerifyYes = document.getElementById('ageVerifyYes');
        const ageVerifyNo = document.getElementById('ageVerifyNo');
        
        // 检查年龄验证状态
        function checkAgeVerification() {
            const isVerified = localStorage.getItem('tvAgeVerified');
            return isVerified === 'true';
        }
        
        // 处理年龄验证通过
        function handleAgeVerifyYes() {
            localStorage.setItem('tvAgeVerified', 'true');
            ageVerificationModal.style.display = 'none';
            init();
        }
        
        // 处理年龄验证未通过
        function handleAgeVerifyNo() {
            // 可以跳转到其他页面或显示提示
            alert('抱歉，本内容仅适合18岁以上成年人观看');
            // 可以选择跳转到首页
            window.location.href = '/';
        }
        
        // 初始化年龄验证事件
        function initAgeVerification() {
            ageVerifyYes.addEventListener('click', handleAgeVerifyYes);
            ageVerifyNo.addEventListener('click', handleAgeVerifyNo);
        }
        
        // 初始化
        async function init() {
            try {
                loadingText.textContent = '加载频道列表...';
                await loadChannels();
                if (channels.length > 0) {
                    // 检查URL中是否有tvID参数
                    const urlParams = new URLSearchParams(window.location.search);
                    const tvID = urlParams.get('tvID');
                    
                    if (tvID) {
                        // 检查是否是TV分享ID（以tv_开头）
                        if (tvID.startsWith('tv_')) {
                            // 从后端API加载分享信息
                            try {
                                const response = await fetch(`/api/tv/shares/${tvID}`);
                                const data = await response.json();
                                
                                if (data.code === 200 && data.data && data.data.channelIds && data.data.channelIds.length > 0) {
                                    const share = data.data;
                                    // 过滤出分享中包含的频道
                                    const sharedChannels = channels.filter(channel => share.channelIds.includes(channel._id));
                                    if (sharedChannels.length > 0) {
                                        // 使用分享的频道列表
                                        channels = sharedChannels;
                                        renderChannelList();
                                        // 从第一个频道开始
                                        currentChannelIndex = 0;
                                        currentVideoIndex = 0;
                                        currentVideoTime = 0;
                                        await switchChannel(currentChannelIndex);
                                    } else {
                                        // 没有找到对应的频道，使用历史记录或默认频道
                                        await loadDefaultChannels();
                                    }
                                } else {
                                    // 没有找到分享记录，使用历史记录或默认频道
                                    await loadDefaultChannels();
                                }
                            } catch (error) {
                                console.error('加载TV分享失败:', error);
                                // 加载失败，使用历史记录或默认频道
                                await loadDefaultChannels();
                            }
                        } else {
                            // 查找tvID对应的频道
                            const channelIndex = channels.findIndex(channel => channel._id === tvID);
                            if (channelIndex !== -1) {
                                // 找到对应的频道，切换到该频道
                                currentChannelIndex = channelIndex;
                                currentVideoIndex = 0;
                                currentVideoTime = 0;
                                await switchChannel(currentChannelIndex);
                            } else {
                                // 没有找到对应的频道，使用历史记录或默认频道
                                await loadDefaultChannels();
                            }
                        }
                    } else {
                        // 没有tvID参数，检查是否存在固定的TV分享
                        try {
                            const response = await fetch('/api/tv/shares');
                            const data = await response.json();
                            
                            if (data.code === 200 && data.data && data.data.length > 0) {
                                // 查找固定的分享
                                const fixedShare = data.data.find(share => share.isFixed);
                                if (fixedShare && fixedShare.channelIds && fixedShare.channelIds.length > 0) {
                                    // 过滤出固定分享中包含的频道
                                    const fixedChannels = channels.filter(channel => fixedShare.channelIds.includes(channel._id));
                                    if (fixedChannels.length > 0) {
                                        // 使用固定分享的频道列表
                                        channels = fixedChannels;
                                        renderChannelList();
                                        // 从第一个频道开始
                                        currentChannelIndex = 0;
                                        currentVideoIndex = 0;
                                        currentVideoTime = 0;
                                        await switchChannel(currentChannelIndex);
                                        return;
                                    }
                                }
                            }
                        } catch (error) {
                            console.error('加载固定TV分享失败:', error);
                        }
                        
                        // 没有固定分享或加载失败，使用历史记录或默认频道
                        const history = loadRecentPlaybackHistory();
                        if (history && history.channelIndex >= 0 && history.channelIndex < channels.length) {
                            // 有历史记录，恢复到上次的频道和视频
                            currentChannelIndex = history.channelIndex;
                            currentVideoIndex = history.videoIndex || 0;
                            currentVideoTime = history.currentTime || 0;
                            await switchChannel(currentChannelIndex);
                        } else {
                            // 没有历史记录，从第一个频道开始
                            await switchChannel(0);
                        }
                    }
                } else {
                    loadingText.textContent = '暂无频道，请在后台添加';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 2000);
                }
            } catch (error) {
                console.error('初始化失败:', error);
                loadingText.textContent = '加载失败，请刷新页面';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 2000);
            }
        }
        
        // 加载默认频道（历史记录或默认）
        async function loadDefaultChannels() {
            const history = loadRecentPlaybackHistory();
            if (history && history.channelIndex >= 0 && history.channelIndex < channels.length) {
                // 有历史记录，恢复到上次的频道和视频
                currentChannelIndex = history.channelIndex;
                currentVideoIndex = history.videoIndex || 0;
                currentVideoTime = history.currentTime || 0;
                await switchChannel(currentChannelIndex);
            } else {
                // 没有历史记录，从第一个频道开始
                await switchChannel(0);
            }
        }
        
        // 加载频道列表
        async function loadChannels() {
            try {
                const response = await fetch('/api/tv/channels');
                const data = await response.json();
                if (data.code === 200 && data.data && data.data.length > 0) {
                    channels = data.data;
                    renderChannelList();
                }
            } catch (error) {
                console.error('加载频道失败:', error);
                throw error;
            }
        }
        
        // 渲染频道列表
        function renderChannelList() {
            const channelListContainer = document.querySelector('.channel-list');
            if (!channelListContainer) return;
            
            channelListContainer.innerHTML = '';
            
            channels.forEach((channel, index) => {
                const channelItem = document.createElement('div');
                channelItem.className = `text-xs mb-1 cursor-pointer ${index === currentChannelIndex ? 'text-primary font-medium' : 'opacity-70 hover:opacity-100'}`;
                channelItem.textContent = `${channel.order}. ${channel.name}`;
                channelItem.onclick = () => showVideoList(index);
                channelListContainer.appendChild(channelItem);
            });
        }
        
        // 显示视频列表
        function showVideoList(channelIndex) {
            const channelList = document.getElementById('channelList');
            const videoList = document.getElementById('videoList');
            
            if (!channelList || !videoList) return;
            
            // 隐藏频道列表，显示视频列表
            channelList.classList.add('hidden');
            videoList.classList.remove('hidden');
            
            // 渲染视频列表
            renderVideoList(channelIndex);
        }
        
        // 渲染视频列表
        function renderVideoList(channelIndex) {
            const videoListContainer = document.querySelector('.video-list');
            if (!videoListContainer) return;
            
            const channel = channels[channelIndex];
            if (!channel || !channel.videos || channel.videos.length === 0) {
                videoListContainer.innerHTML = '<div class="text-xs opacity-70">该频道暂无视频</div>';
                return;
            }
            
            videoListContainer.innerHTML = '';
            
            channel.videos.forEach((video, index) => {
                const videoItem = document.createElement('div');
                videoItem.className = `text-xs mb-1 cursor-pointer opacity-70 hover:opacity-100`;
                videoItem.textContent = `${video.order}. ${video.title}`;
                videoItem.onclick = () => {
                currentChannelIndex = channelIndex;
                currentVideoIndex = index;
                currentVideoTime = 0; // 重置播放时间，确保新视频从开始播放
                // 更新当前频道名称
                currentChannelName.textContent = channels[channelIndex].name;
                // 重新渲染频道列表，更新选中状态
                renderChannelList();
                playCurrentVideo();
                // 隐藏频道列表和视频列表，进入全屏模式
                document.getElementById('channelList').classList.add('hidden');
                document.getElementById('videoList').classList.add('hidden');
            };
                videoListContainer.appendChild(videoItem);
            });
        }
        
        // 返回频道列表
        function backToChannels() {
            document.getElementById('channelList').classList.remove('hidden');
            document.getElementById('videoList').classList.add('hidden');
        }
        
        // 初始化返回按钮事件
        document.getElementById('backToChannels').addEventListener('click', backToChannels);
        
        // 切换频道
        async function switchChannel(index) {
            if (index === currentChannelIndex && dplayer) {
                return;
            }
            
            currentChannelIndex = index;
            // 只有在不是恢复历史记录时才重置视频索引和时间
            // 如果是从历史记录恢复，currentVideoIndex和currentVideoTime已经被设置
            if (currentVideoTime === 0) {
                currentVideoIndex = 0;
            }
            isLoading = true;
            loadingOverlay.style.display = 'flex';
            loadingText.textContent = `切换到 ${channels[index].name}...`;
            
            // 显示频道切换过渡效果
            channelTransition.classList.remove('hidden');
            setTimeout(() => {
                channelTransition.classList.add('hidden');
            }, 1000);
            
            try {
                // 销毁旧播放器
                if (dplayer) {
                    dplayer.destroy();
                }
                
                // 更新频道信息
                currentChannelName.textContent = channels[index].name;
                
                // 重新渲染频道列表，更新选中状态
                renderChannelList();
                
                // 播放当前频道的视频
                await playCurrentVideo();
                // 确保频道列表显示，视频列表隐藏
                document.getElementById('channelList').classList.remove('hidden');
                document.getElementById('videoList').classList.add('hidden');
            } catch (error) {
                console.error('切换频道失败:', error);
                loadingText.textContent = '切换失败，请重试';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 2000);
            }
        }
        
        // 播放当前视频
        async function playCurrentVideo() {
            const channel = channels[currentChannelIndex];
            if (!channel.videos || channel.videos.length === 0) {
                loadingText.textContent = '该频道暂无视频';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 2000);
                return;
            }
            
            const video = channel.videos[currentVideoIndex];
            currentChannelName.textContent = channel.name;
            currentVideoTitle.textContent = video.title;
            loadingText.textContent = `加载视频: ${video.title}...`;
            
            // 创建新播放器
            const videoUrl = (video.m3u8 || video.url).replace(/[`]/g, '').trim();
            
            // 加载当前视频的播放历史
            if (currentVideoTime === 0) {
                const videoHistory = loadPlaybackHistory(videoUrl);
                if (videoHistory) {
                    currentVideoTime = videoHistory.currentTime || 0;
                }
            }
            const playerOptions = {
                container: document.getElementById('dplayer'),
                video: {
                    url: videoUrl,
                    pic: (video.image || '').replace(/[`]/g, '').trim(),
                    title: video.title
                },
                autoplay: true,
                theme: '#3b82f6',
                contextmenu: [],
                mutex: true
            };
            
            // 如果是 M3U8 地址，使用 hls.js
            if (video.m3u8 && window.Hls) {
                playerOptions.hls = true;
            }
            
            dplayer = new DPlayer(playerOptions);
            
            // 监听播放事件
            dplayer.on('play', () => {
                isPlaying = true;
                // 保存播放历史
                savePlaybackHistory();
                
                // 5秒后自动隐藏频道列表
                setTimeout(() => {
                    const channelList = document.getElementById('channelList');
                    const videoList = document.getElementById('videoList');
                    if (!channelList.classList.contains('hidden')) {
                        channelList.classList.add('hidden');
                    }
                    if (!videoList.classList.contains('hidden')) {
                        videoList.classList.add('hidden');
                    }
                }, 5000);
            });
            
            // 监听暂停事件
            dplayer.on('pause', () => {
                isPlaying = false;
                // 保存播放历史
                savePlaybackHistory();
            });
            
            // 监听播放时间更新事件
            dplayer.on('timeupdate', () => {
                // 每10秒保存一次播放历史
                if (Math.floor(dplayer.video.currentTime) % 10 === 0) {
                    savePlaybackHistory();
                }
            });
            
            // 监听视频结束事件
            dplayer.on('ended', () => {
                // 保存播放历史
                savePlaybackHistory();
            });
            
            // 监听错误事件
            dplayer.on('error', (error) => {
                console.error('播放器错误:', error);
            });
            
            // 恢复上次的播放位置
            if (currentVideoTime > 0) {
                setTimeout(() => {
                    dplayer.seek(currentVideoTime);
                }, 1000);
            }
            
            // 隐藏加载覆盖层
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                isLoading = false;
            }, 1000);
        }
        
        // 保存播放历史
        function savePlaybackHistory() {
            if (!dplayer || !channels.length) return;
            
            const currentChannel = channels[currentChannelIndex];
            if (!currentChannel || !currentChannel.videos || !currentChannel.videos.length) return;
            
            const currentVideo = currentChannel.videos[currentVideoIndex];
            if (!currentVideo) return;
            
            // 获取视频URL作为唯一标识
            const videoUrl = (currentVideo.m3u8 || currentVideo.url).replace(/[`]/g, '').trim();
            if (!videoUrl) return;
            
            // 从localStorage加载所有播放历史
            let allHistory = {};
            try {
                const historyStr = localStorage.getItem(PLAYBACK_HISTORY_KEY);
                if (historyStr) {
                    allHistory = JSON.parse(historyStr);
                }
            } catch (error) {
                console.error('加载播放历史失败:', error);
            }
            
            // 保存当前视频的播放历史
            allHistory[videoUrl] = {
                channelIndex: currentChannelIndex,
                videoIndex: currentVideoIndex,
                currentTime: dplayer.video.currentTime,
                channelId: currentChannel.id || currentChannel.name,
                videoId: currentVideo.id || currentVideo.title,
                timestamp: Date.now()
            };
            
            localStorage.setItem(PLAYBACK_HISTORY_KEY, JSON.stringify(allHistory));
        }
        
        // 加载播放历史
        function loadPlaybackHistory(videoUrl) {
            try {
                const historyStr = localStorage.getItem(PLAYBACK_HISTORY_KEY);
                if (historyStr) {
                    const allHistory = JSON.parse(historyStr);
                    if (videoUrl && allHistory[videoUrl]) {
                        return allHistory[videoUrl];
                    }
                }
            } catch (error) {
                console.error('加载播放历史失败:', error);
            }
            return null;
        }
        
        // 加载最近的播放历史
        function loadRecentPlaybackHistory() {
            try {
                const historyStr = localStorage.getItem(PLAYBACK_HISTORY_KEY);
                if (historyStr) {
                    const allHistory = JSON.parse(historyStr);
                    let recentHistory = null;
                    let recentTimestamp = 0;
                    
                    // 找到最近的播放历史
                    for (const [url, history] of Object.entries(allHistory)) {
                        if (history.timestamp > recentTimestamp) {
                            recentTimestamp = history.timestamp;
                            recentHistory = history;
                        }
                    }
                    
                    return recentHistory;
                }
            } catch (error) {
                console.error('加载最近播放历史失败:', error);
            }
            return null;
        }
        
        // 点击屏幕显示/隐藏频道列表
        function toggleChannelList() {
            const channelList = document.getElementById('channelList');
            const videoList = document.getElementById('videoList');
            
            if (channelList.classList.contains('hidden') && videoList.classList.contains('hidden')) {
                // 显示频道列表
                channelList.classList.remove('hidden');
            } else {
                // 隐藏频道列表和视频列表
                channelList.classList.add('hidden');
                videoList.classList.add('hidden');
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            // 初始化年龄验证事件
            initAgeVerification();
            
            // 检查年龄验证状态
            if (checkAgeVerification()) {
                // 已经验证过，直接初始化
                init();
            } else {
                // 未验证过，显示验证框
                ageVerificationModal.style.display = 'flex';
            }
            
            // 添加屏幕点击事件
            const tvScreen = document.querySelector('.tv-screen');
            if (tvScreen) {
                tvScreen.addEventListener('click', (e) => {
                    // 点击屏幕背景或播放器时切换频道列表
                    if (e.target === tvScreen || e.target === document.getElementById('dplayer')) {
                        toggleChannelList();
                    }
                });
            }
            
            // 添加tv-info点击事件，确保点击频道信息区域也能显示频道列表
            const tvInfo = document.querySelector('.tv-info');
            if (tvInfo) {
                tvInfo.addEventListener('click', (e) => {
                    // 点击tv-info时显示频道列表，但只有在视频列表也隐藏时才显示
                    const channelList = document.getElementById('channelList');
                    const videoList = document.getElementById('videoList');
                    if (channelList.classList.contains('hidden') && videoList.classList.contains('hidden')) {
                        channelList.classList.remove('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
